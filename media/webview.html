          if (isSimpleActionStep(step)) return false
          const stepType = String(step?.type || "").toLowerCase()
          const desc = String(step?.description || "").toLowerCase()
          if (
            ["file_read", "search", "find_files", "analyze"].includes(stepType)
          ) {
            return true
          }
          if (/\b(read|search|find|analy[sz]e)\b/.test(desc)) {
            return true
          }
          return false
        }
        const isDiscoveryCommand = (cmd) =>
          /^(ls|dir|tree|find)\b/i.test((cmd || "").trim()) ||
          /^get-childitem\b/i.test((cmd || "").trim()) ||
          /^rg(\s|$).*--files/i.test((cmd || "").trim())
        const escapeTerminalAttr = (s) =>
          String(s || "").replace(/"/g, "&quot;")
        const sanitizeTerminalBody = (s) =>
          String(s || "").replace(/\[\/terminal\]/g, "[/terminal-escaped]")
        const buildTerminalBlock = (command, output, status = "running") =>
          `\n[terminal command="${escapeTerminalAttr(command)}" status="${status}"]${sanitizeTerminalBody(output)}[/terminal]\n`
        const pushStepHistory = (stepNum, stepDesc, body, status = "done") => {
          const safeBody = String(body || "")
            .replace(/\[\/thinking\]/g, "[/thinking-escaped]")
            .slice(0, 12000)
          const label = status === "error" ? "Failed" : "Completed"
          const title = `Step ${stepNum} ${label}: ${String(stepDesc || "").slice(0, 90)}`
          stepHistoryBlocks.push(
            `\n[thinking title="${escapeTerminalAttr(title)}"]\n\`\`\`\n${safeBody}\n\`\`\`\n[/thinking]\n`,
          )
        }
        const isVerificationOnlyStep = (step) => {
          const t = String(step?.type || "").toLowerCase()
          const desc = String(step?.description || "")
          const cmd = String(step?.command || "")
          if (
            ["file_read", "search", "find_files", "analyze", "chat"].includes(t)
          ) {
            return (
              /\b(read|check|verify|validat|confirm|inspect)\b/i.test(desc) ||
              t !== "chat"
            )
          }
          if (t === "terminal_command") {
            return isVerificationCommandLite(cmd)
          }
          return /\b(read|check|verify|validat|confirm|inspect)\b/i.test(desc)
        }

        for (let i = 0; i < plan.length; i++) {
          const step = plan[i]
          const stepNum = i + 1
          const stepSignature = `${normalizeSignatureText(step?.type || "unknown")}::${normalizeSignatureText(step?.description || "")}::${normalizeSignatureText(step?.command || "")}`
          if (workflowMeta && workflowMeta.stepAttemptCounts) {
            const prevStepAttempts =
              workflowMeta.stepAttemptCounts.get(stepSignature) || 0
            const nextStepAttempts = prevStepAttempts + 1
            workflowMeta.stepAttemptCounts.set(stepSignature, nextStepAttempts)
            if (nextStepAttempts >= 4) {
              hadStepError = true
              context +=
                `\n[Loop Guard] Repeated step blocked (${nextStepAttempts}x): ${step.description}\n` +
                `[Loop Guard] Generate different step with new strategy. If file edits keep failing, use full [file] overwrite and then single verify command.\n`
              currentStepMarkdown += `\n  > *Loop guard:* Repeated step blocked. Replanning with different strategy.\n`
              updateMessagesAssistant({
                uniqueId: `assistant-${uniqueId}`,
                content: currentStepMarkdown,
              })
              break
            }
          }
          if (!isLoading) {
            break
          }
          // Update to In Progress in the chat bubble
          const inProgressRegex = new RegExp(
            `^\\s*-\\s*\\[\\s*\\]\\s*${step.description.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")}`,
            "gm",
          )
          currentStepMarkdown = currentStepMarkdown.replace(
            inProgressRegex,
            `- [🔄] ${step.description}`,
          )
          updateMessagesAssistant({
            uniqueId: `assistant-${uniqueId}`,
            content: currentStepMarkdown,
          })

          // Update global plan status
          if (window.currentPlanMarkdown) {
            const globalStepRegex = new RegExp(
              `^\\s*-\\s*\\[\\s*\\]\\s*Step\\s+${stepNum}:\\s*${step.description.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")}`,
              "gm",
            )
            window.currentPlanMarkdown = window.currentPlanMarkdown.replace(
              globalStepRegex,
              `- [🔄] Step ${stepNum}: ${step.description}`,
            )
            updatePlanPopup(window.currentPlanMarkdown)
            updatePlanButtonTitle(window.currentPlanMarkdown)
          }

          const normalizedStepType = String(step?.type || "")
            .trim()
            .toLowerCase()
          if (normalizedStepType === "complete") {
            context += `\nStep ${step.step} Completion:\n${step.description}\n`
            pushStepHistory(
              stepNum,
              step.description,
              `Step Type: complete\n\n${step.description}`,
              "done",
            )

            const doneRegex = new RegExp(
              `^\\s*-\\s*\\[ðŸ”„\\]\\s*(Step\\s+${stepNum}:)`,
              "gm",
            )
            planMarkdown = planMarkdown.replace(doneRegex, `- [âœ…] $1`)
            updateMessagesAssistant({
              uniqueId: `assistant-${uniqueId}`,
              content:
                planMarkdown +
                `\n  > *Step ${stepNum}: Completion acknowledged. No further code execution required.*\n`,
            })
            if (window.currentPlanMarkdown) {
              window.currentPlanMarkdown = window.currentPlanMarkdown.replace(
                doneRegex,
                `- [âœ…] Step ${stepNum}:`,
              )
              updatePlanPopup(window.currentPlanMarkdown)
              updatePlanButtonTitle(window.currentPlanMarkdown)
            }
            continue
          }

          try {
            let thinkOutput = ""
            if (shouldRunThinkPhase(step)) {
              // --- PHASE 1: THINKING (only when truly needed) ---
              updateMessagesAssistant({
                uniqueId: `assistant-${uniqueId}`,
                content: currentStepMarkdown + `\n  > *Thinking...*`,
              })

              const thinkResponse = await fetch(
                "http://localhost:13100/api/agent/execute",
                {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({
                    userId,
                    token,
                    model: selectedModel,
                    userApiKey,
                    verification_mode: verificationMode,
                    step,
                    context, // Pass the accumulated context
                    mode: "think",
                    attachments,
                    guardrails: currentGuardrails,
                    sessionId: currentSessionId,
                  }),
                  signal: agentAbortController?.signal,
                },
              )
              if (!thinkResponse.ok) {
                throw new Error(
                  `Think request failed (${thinkResponse.status})`,
                )
              }

              const thinkReader = thinkResponse.body.getReader()
              const thinkDecoder = new TextDecoder()
              while (true) {
                const { value, done } = await thinkReader.read()
                if (done) break
                thinkOutput += thinkDecoder.decode(value, { stream: true })
              }

              const thoughtMatch = thinkOutput.match(
                /\*\*Thought:\*\*([\s\S]*?)(?=\*\*Action:|$)/i,
              )
              const thought = thoughtMatch
                ? thoughtMatch[1].trim()
                : "Analyzing context..."

              currentStepMarkdown += `\n  > *Thought:* ${thought}\n`
              updateMessagesAssistant({
                uniqueId: `assistant-${uniqueId}`,
                content: currentStepMarkdown,
              })
            } else {
              currentStepMarkdown += `\n  > *Thought:* Action-first execution (skip deep analysis for coding step).\n`
              updateMessagesAssistant({
                uniqueId: `assistant-${uniqueId}`,
                content: currentStepMarkdown,
              })
            }

            // Check for [readFile]
            // Updated regex to be more flexible with quotes and spacing
            const readFileRegex = /\[readFile\]([\s\S]*?)\[\/readFile\]/
            const readFileMatch = thinkOutput.match(readFileRegex)

            if (readFileMatch) {
              const fileBlock = readFileMatch[1]
              // Use non-global regex for matchAll or exec in loop
              const filePathsRegex = /\[file\s+path=["']([^"']+)["']\s*\]/g
              let fileMatch

              while ((fileMatch = filePathsRegex.exec(fileBlock)) !== null) {
                const filePath = fileMatch[1]

                // Visual feedback
                currentStepMarkdown += `\n  > *Reading file:* ${filePath}\n`
                updateMessagesAssistant({
                  uniqueId: `assistant-${uniqueId}`,
                  content: currentStepMarkdown,
                })

                // Send readFile to extension with timeout
                try {
                  const fileContent = await new Promise((resolve, reject) => {
                    // Define handler first so we can remove it
                    let handleMessage
                    let handleStop

                    const timeout = setTimeout(() => {
                      window.removeEventListener("message", handleMessage)
                      window.removeEventListener("agent-stop", handleStop)
                      resolve(`Error: Timeout reading file ${filePath}`)
                    }, 15000) // 15 second timeout

                    handleStop = () => {
                      clearTimeout(timeout)
                      window.removeEventListener("message", handleMessage)
                      window.removeEventListener("agent-stop", handleStop)
                      const err = new Error("Aborted by user")
                      err.name = "AbortError"
                      reject(err)
                    }

                    handleMessage = (event) => {
                      if (
                        event.data.command === "readFileResult" &&
                        event.data.filePath === filePath
                      ) {
                        clearTimeout(timeout)
                        window.removeEventListener("message", handleMessage)
                        window.removeEventListener("agent-stop", handleStop)
                        resolve(event.data.content || event.data.error || "")
                      }
                    }
                    window.addEventListener("message", handleMessage)
                    window.addEventListener("agent-stop", handleStop)
                    vscode.postMessage({ type: "readFile", filePath })
                  })

                  const err = new Error("Aborted by user")
                  err.name = "AbortError"
                  if (!isLoading) throw err

                  context += `\nFile Content (${filePath}):\n${fileContent}\n`

                  // Visual feedback completion
                  currentStepMarkdown += `\n  > *Read complete.*\n`
                  updateMessagesAssistant({
                    uniqueId: `assistant-${uniqueId}`,
                    content: currentStepMarkdown,
                  })
                } catch (e) {
                  context += `\nError reading file ${filePath}: ${e}\n`
                  currentStepMarkdown += `\n  > *Error reading file:* ${e}\n`
                  updateMessagesAssistant({
                    uniqueId: `assistant-${uniqueId}`,
                    content: currentStepMarkdown,
                  })
                }
              }
            }

            // Check for [searchFiles]
            const searchFilesRegex =
              /\[searchFiles\]([\s\S]*?)\[\/searchFiles\]/i
            const searchFilesMatch = thinkOutput.match(searchFilesRegex)
            if (searchFilesMatch) {
              const query = searchFilesMatch[1].trim()
              currentStepMarkdown += `\n  > *Searching for:* \`${query}\`\n`
              updateMessagesAssistant({
                uniqueId: `assistant-${uniqueId}`,
                content: currentStepMarkdown,
              })

              try {
                const searchResult = await new Promise((resolve, reject) => {
                  let handleMessage
                  let handleStop

                  const timeout = setTimeout(() => {
                    window.removeEventListener("message", handleMessage)
                    window.removeEventListener("agent-stop", handleStop)
                    resolve("Error: Timeout searching files.")
                  }, 60000)

                  handleStop = () => {
                    clearTimeout(timeout)
                    window.removeEventListener("message", handleMessage)
                    window.removeEventListener("agent-stop", handleStop)
                    const err = new Error("Aborted by user")
                    err.name = "AbortError"
                    reject(err)
                  }

                  handleMessage = (event) => {
                    if (event.data.command === "systemLog") {
                      currentStepMarkdown += `\n  > *${event.data.message}*`
                      updateMessagesAssistant({
                        uniqueId: `assistant-${uniqueId}`,
                        content: currentStepMarkdown,
                      })
                    }
                    if (event.data.command === "searchResult") {
                      clearTimeout(timeout)
                      window.removeEventListener("message", handleMessage)
                      window.removeEventListener("agent-stop", handleStop)
                      resolve(
                        event.data.results || event.data.error || "No matches.",
                      )
                    }
                  }
                  window.addEventListener("message", handleMessage)
                  window.addEventListener("agent-stop", handleStop)
                  vscode.postMessage({ command: "search", query })
                })

                const err = new Error("Aborted by user")
                err.name = "AbortError"
                if (!isLoading) throw err

                context += `\nSearch Results for "${query}":\n${searchResult}\n`
                currentStepMarkdown += `\n  > *Search complete.*\n`
                const displayResults =
                  searchResult.length > 500
                    ? searchResult.slice(0, 500) + "\n... (truncated)"
                    : searchResult
                currentStepMarkdown += `\n\`\`\`\n${displayResults}\n\`\`\`\n`
                updateMessagesAssistant({
                  uniqueId: `assistant-${uniqueId}`,
                  content: currentStepMarkdown,
                })
              } catch (e) {
                context += `\nError searching: ${e}\n`
              }
            }

            // Check for [findFiles]
            const findFilesRegex = /\[findFiles\]([\s\S]*?)\[\/findFiles\]/i
            const findFilesMatch = thinkOutput.match(findFilesRegex)
            if (findFilesMatch) {
              const pattern = findFilesMatch[1].trim()
              currentStepMarkdown += `\n  > *Finding files:* \`${pattern}\`\n`
              updateMessagesAssistant({
                uniqueId: `assistant-${uniqueId}`,
                content: currentStepMarkdown,
              })

              let findResult = ""
              try {
                if (window.filePathCache && window.filePathCache.has(pattern)) {
                  findResult = window.filePathCache.get(pattern)
                  currentStepMarkdown += `\n  > *Found in cache.*\n`
                  console.log(`[webview] Cache hit for pattern: ${pattern}`)
                } else {
                  findResult = await new Promise((resolve, reject) => {
                    let handleMessage
                    let handleStop

                    const timeout = setTimeout(() => {
                      window.removeEventListener("message", handleMessage)
                      window.removeEventListener("agent-stop", handleStop)
                      resolve("Error: Timeout finding files.")
                    }, 60000)

                    handleStop = () => {
                      clearTimeout(timeout)
                      window.removeEventListener("message", handleMessage)
                      window.removeEventListener("agent-stop", handleStop)
                      const err = new Error("Aborted by user")
                      err.name = "AbortError"
                      reject(err)
                    }

                    handleMessage = (event) => {
                      if (event.data.command === "systemLog") {
                        currentStepMarkdown += `\n  > *${event.data.message}*`
                        updateMessagesAssistant({
                          uniqueId: `assistant-${uniqueId}`,
                          content: currentStepMarkdown,
                        })
                      }
                      if (event.data.command === "listFilesResult") {
                        clearTimeout(timeout)
                        window.removeEventListener("message", handleMessage)
                        window.removeEventListener("agent-stop", handleStop)
                        resolve(
                          event.data.files
                            ? event.data.files.join("\n")
                            : event.data.error || "No files found.",
                        )
                      }
                    }
                    window.addEventListener("message", handleMessage)
                    window.addEventListener("agent-stop", handleStop)
                    vscode.postMessage({ command: "listFiles", pattern })
                  })

                  // Cache the result
                  if (findResult && !findResult.startsWith("Error")) {
                    if (window.filePathCache) {
                      window.filePathCache.set(pattern, findResult)
                      saveState() // Persist immediately
                    }
                  }
                }

                const err = new Error("Aborted by user")
                err.name = "AbortError"
                if (!isLoading) throw err

                context += `\nFiles Found for "${pattern}":\n${findResult}\n`
                currentStepMarkdown += `\n  > *Find complete.*\n`
                const displayFiles =
                  findResult.length > 500
                    ? findResult.slice(0, 500) + "\n... (truncated)"
                    : findResult
                currentStepMarkdown += `\n\`\`\`\n${displayFiles}\n\`\`\`\n`
                updateMessagesAssistant({
                  uniqueId: `assistant-${uniqueId}`,
                  content: currentStepMarkdown,
                })
              } catch (e) {
                context += `\nError finding files: ${e}\n`
              }
            }

            // Sync planMarkdown with currentStepMarkdown to include Think logs
            planMarkdown = currentStepMarkdown

            // --- PHASE 2: EXECUTE ---
            if (planMarkdown.indexOf("> *Executing...*") === -1) {
              planMarkdown += `\n  > *Executing...*\n`
              updateMessagesAssistant({
                uniqueId: `assistant-${uniqueId}`,
                content: planMarkdown,
              })
            }

            const response = await fetch(
              "http://localhost:13100/api/agent/execute",
              {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  userId,
                  token,
                  model: selectedModel,
                  userApiKey,
                  verification_mode: verificationMode,
                  step,
                  context,
                  mode: "execute",
                  attachments,
                  guardrails: currentGuardrails,
                  sessionId: currentSessionId,
                }),
                signal: agentAbortController?.signal,
              },
            )
            if (!response.ok) {
              throw new Error(`Execute request failed (${response.status})`)
            }

            const reader = response.body.getReader()
            const decoder = new TextDecoder()
            let stepOutput = ""

            while (true) {
              const { value, done } = await reader.read()
              if (done) break
              const chunk = decoder.decode(value, { stream: true })
              stepOutput += chunk

              // Only update UI if we have a substantial chunk or it's been a while?
              // For now, let's assume stepOutput is raw text.
              // We want to replace the "Executing..." block or append to it.
              // But stepOutput grows.
              // Let's create a temporary variable for display.
              // We need to escape special markdown characters if we are dumping raw text?
              // The agent output usually contains markdown.

              // Strategy: Replace "Executing..." with "Executing...\n\n" + stepOutput
              // But planMarkdown already has "Executing...".

              const executingBlock = `\n  > *Executing...*\n`
              // Update with streaming output
              updateMessagesAssistant({
                uniqueId: `assistant-${uniqueId}`,
                content: planMarkdown + executingBlock + `\n${stepOutput}`,
              })
            }

            // After execution, remove "Executing..." and append final output
            planMarkdown = planMarkdown.replace(`\n  > *Executing...*\n`, "")
            // Legacy recovery: some models still return JSON plan payload in execute mode.
            // Convert legacy JSON output into executable agent tags.
            const parseEchoRedirectWrite = (commandText) => {
              const command = String(commandText || "").trim()
              if (!command) return null
              const m = command.match(
                /^\s*echo\s+(['"])([\s\S]*?)\1\s*>\s*([^\s]+)\s*$/i,
              )
              if (!m) return null
              const quote = m[1]
              let body = m[2] || ""
              const target = String(m[3] || "")
                .trim()
                .replace(/^["']|["']$/g, "")
              if (!target) return null

              body = body
                .replace(/\\n/g, "\n")
                .replace(/\\r/g, "\r")
                .replace(/\\t/g, "\t")
              if (quote === '"') {
                body = body.replace(/\\"/g, '"')
              } else {
                body = body.replace(/\\'/g, "'")
              }
              body = body.replace(/\\\\/g, "\\")

              return `[writeFile]\n[file name="${target}"]\n${body}\n[/file]\n[/writeFile]`
            }

            const extractLegacyExecutePayload = (rawText, stepType) => {
              const text = String(rawText || "").trim()
              if (!text) return null
              if (
                /\[(?:writeFile|writeFileVico|command|REPLAN)\]/i.test(text)
              ) {
                return null
              }

              let jsonText = text
              const fenced = text.match(/^```(?:json)?\s*([\s\S]*?)```$/i)
              if (fenced && fenced[1]) {
                jsonText = fenced[1].trim()
              }

              let parsed = null
              try {
                parsed = JSON.parse(jsonText)
              } catch (_e) {
                return null
              }

              if (!parsed || typeof parsed !== "object") return null
              const resolveCommand = () => {
                if (typeof parsed.command === "string" && parsed.command.trim()) {
                  return parsed.command.trim()
                }
                if (Array.isArray(parsed.plan)) {
                  const cmdStep = parsed.plan.find(
                    (p) =>
                      p &&
                      typeof p.command === "string" &&
                      p.command.trim(),
                  )
                  if (cmdStep && cmdStep.command) {
                    return String(cmdStep.command).trim()
                  }
                }
                return ""
              }

              const command = resolveCommand()
              if (!command) return null
              if (String(stepType || "").toLowerCase() === "file_write") {
                const writePayload = parseEchoRedirectWrite(command)
                if (writePayload) return writePayload
              }
              return `[command]\n${command}\n[/command]`
            }

            const legacyPayload = extractLegacyExecutePayload(
              stepOutput,
              step?.type,
            )
            if (legacyPayload) {
              stepOutput = legacyPayload
              context +=
                `\n[System Feedback] Execute output was legacy JSON-plan format; auto-converted to executable agent tags.\n`
              planMarkdown += `\n> *?? Legacy execute output detected and auto-converted to executable tags.*\n`
              updateMessagesAssistant({
                uniqueId: `assistant-${uniqueId}`,
                content: planMarkdown,
              })
            }
            // Enhanced writeFile format validation
            const hasWriteFileTag = /\[(?:writeFile|writeFileVico)\]/i.test(
              stepOutput,
            )
            if (hasWriteFileTag) {
              const hasClosingTag = /\[\/(?:writeFile|writeFileVico)\]/i.test(
                stepOutput,
              )
              const hasFileBlock = stepOutput.includes("[file ")
              const hasDiffBlock = stepOutput.includes("[diff ")

              planMarkdown += `\n  > *Writing files...*\n`

              // Add format validation warnings
              if (!hasClosingTag) {
                planMarkdown += `\n> ⚠️ **Format Warning:** Missing closing [/writeFile] tag\n`
                console.warn("[writeFile] Missing closing tag in agent response")
              }
              if (!hasFileBlock && !hasDiffBlock) {
                planMarkdown += `\n> ⚠️ **Format Warning:** No [file] or [diff] blocks found inside [writeFile]\n`
                console.warn("[writeFile] No file/diff blocks in agent response")
              }
            }

            // If it contains writeFile, we want to render the panel, so don't wrap the whole thing in backticks
            // if it's likely to be a writeFile response.
            if (hasWriteFileTag) {
              const normalizedStepOutput = stepOutput.replace(
                /\[(\/?)writeFileVico\s*\]/gi,
                "[$1writeFile]",
              )
              planMarkdown += `\n${normalizedStepOutput}\n`
            } else {
              planMarkdown += `\n> *Execution Output:*\n\`\`\`\n${stepOutput.slice(0, 1000)}${stepOutput.length > 1000 ? "..." : ""}\n\`\`\`\n`
            }

            updateMessagesAssistant({
              uniqueId: `assistant-${uniqueId}`,
              content: planMarkdown,
            })

            // Append output to context for next steps
            // CRITICAL: Ensure we capture the FULL output for the agent's context
            // Note: 'context' is updated below correctly combining previous context and stepOutput.
            // currentContext += ... NO, currentContext is not in scope here.

            // Also capture any file read/search results that happened in the "Think" phase
            // (They were added to 'context' local variable, but we need them in 'currentContext')
            // Wait, 'context' local variable was initialized from 'currentContext' at the start of loop?
            // No, in handleAgentWorkflow:
            //    let currentContext = "";
            //    ...
            //    const context = currentContext;
            // So 'context' is a local copy? No, strings are immutable.
            // We need to update 'currentContext' with whatever was added to 'context'.

            // Actually, we should just use 'currentContext' throughout.
            // But the code above used 'context'.
            // Let's synchronize them.
            // The code above did: context += ...
            // So we need to make sure those changes are reflected in currentContext for the NEXT iteration.

            // Calculate the diff or just append?
            // 'context' started as 'currentContext'.
            // So 'context' contains 'currentContext' + new stuff.

            // Only update currentContext if context has more content (it should)
            // But 'currentContext' is not defined in this scope!
            // 'context' is the local variable we are accumulating.

            /* 
                                    if (context.length > currentContext.length) {
                                      currentContext = context;
                                    } else {
                                      currentContext = context;
                                    }
                                    */

            // Also append the execution output to currentContext if it wasn't added to 'context' yet?
            // stepOutput is added to 'currentContext' above: currentContext += ...
            // But 'context' does NOT have stepOutput yet.
            // So if we set currentContext = context, we lose stepOutput!

            // Correct logic:
            // 1. 'context' has the Think phase results (read/search).
            // 2. 'stepOutput' has the Execute phase results.
            // 3. We want currentContext to have BOTH.
            // 4. 'existingContext' passed to this function is the BASE.
            // 5. 'context' variable in this function started as 'existingContext' and had Think results appended.

            // So:
            const newContext =
              context +
              `\nStep ${step.step} Execution Output:\n${stepOutput}\n`

            // We need to return the FULL UPDATED context to the caller
            // But we also need to update the local 'context' variable for the next iteration of the loop
            // (even though executePlan loop usually only has 1 step now)
            context = newContext
            pushStepHistory(
              stepNum,
              step.description,
              `Step Type: ${step.type || "unknown"}\n\n${stepOutput}`,
              "done",
            )

            // Update to Complete in the chat bubble
            const completeRegex = new RegExp(
              `^\\s*-\\s*\\[🔄\\]\\s*${step.description.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")}`,
              "gm",
            )
            currentStepMarkdown = currentStepMarkdown.replace(
              completeRegex,
              `- [✅] ${step.description}`,
            )
            updateMessagesAssistant({
              uniqueId: `assistant-${uniqueId}`,
              content: currentStepMarkdown,
            })

            // Update global plan status to Complete
            if (window.currentPlanMarkdown) {
              const globalStepRegex = new RegExp(
                `^\\s*-\\s*\\[🔄\\]\\s*Step\\s+${stepNum}:\\s*${step.description.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")}`,
                "gm",
              )
              window.currentPlanMarkdown = window.currentPlanMarkdown.replace(
                globalStepRegex,
                `- [✅] Step ${stepNum}: ${step.description}`,
              )
              updatePlanPopup(window.currentPlanMarkdown)
              updatePlanButtonTitle(window.currentPlanMarkdown)
            }

            // Process Actions
            if (stepOutput.includes("[REPLAN]")) {
              const replanMatch =
                stepOutput.match(/\[REPLAN\]([\s\S]*?)\[\/REPLAN\]/i) ||
                stepOutput.match(/\[REPLAN\]([\s\S]*?)$/i)
              const replanReason = replanMatch
                ? replanMatch[1].trim()
                : "Replanning required."
              const isOptionalMemoryWhitelistReplan =
                /whitelist/i.test(replanReason) &&
                /\.vico\/|memory\.md|lessons?\.md/i.test(replanReason)
              if (isOptionalMemoryWhitelistReplan) {
                context += `\n[System Feedback] REPLAN due to .vico whitelist restriction was treated as optional/non-fatal. Skip memory update and continue main implementation without asking user.\n`
                planMarkdown += `\n> *ℹ️ Skipping optional .vico memory update (not whitelisted). Continuing main task.*\n`
                updateMessagesAssistant({
                  uniqueId: `assistant-${uniqueId}`,
                  content: planMarkdown,
                })
                continue
              }

              // Check if currentStepMarkdown is defined, if not, fallback to planMarkdown or empty string
              if (typeof currentStepMarkdown !== "undefined") {
                currentStepMarkdown += `\n> *⚠️ Plan Divergence. Replanning...*\n`
                currentStepMarkdown += `\n> *Reason:* ${replanReason}\n`
                updateMessagesAssistant({
                  uniqueId: `assistant-${uniqueId}`,
                  content: currentStepMarkdown,
                })
              } else {
                // Fallback if currentStepMarkdown is missing
                planMarkdown += `\n> *⚠️ Plan Divergence. Replanning...*\n`
                planMarkdown += `\n> *Reason:* ${replanReason}\n`
                updateMessagesAssistant({
                  uniqueId: `assistant-${uniqueId}`,
                  content: planMarkdown,
                })
              }

              hadStepError = true
              context += `\n[System Feedback] REPLAN requested in step ${step.step}. Reason: ${replanReason}\n[System Feedback] Create a new plan that addresses this reason, avoid repeating the same failed step, then continue the original request until complete.\n`

              const errorRegex = new RegExp(
                `^\\s*-\\s*\\[🔄\\]\\s*(Step\\s+${stepNum}:)`,
                "gm",
              )
              planMarkdown = planMarkdown.replace(errorRegex, `- [❌] $1`)
              planMarkdown += `\n  > *Step ${stepNum} Cancelled (Replanning). A new plan will be generated in the next iteration.*\n`

              // Update global plan status to Failed
              if (window.currentPlanMarkdown) {
                window.currentPlanMarkdown = window.currentPlanMarkdown.replace(
                  errorRegex,
                  `- [❌] Step ${stepNum}:`,
                )
                updatePlanPopup(window.currentPlanMarkdown)
                updatePlanButtonTitle(window.currentPlanMarkdown)
              }

              updateMessagesAssistant({
                uniqueId: `assistant-${uniqueId}`,
                content: planMarkdown,
              })

              break
            }

            if (stepOutput.includes("[writeFile]")) {
              const recoverTransientPath = (rawPath) => {
                const normalized = String(rawPath || "").replace(/\\/g, "/")
                const parts = normalized.split("/")
                const base = parts.pop() || ""
                const m = base.match(/^vico_(?:backup|diff)_[0-9a-f]+_(.+)$/i)
                if (!m) return null
                parts.push(m[1])
                return parts.join("/")
              }
              const normalizeWritePayloadPaths = (payload) => {
                let changed = false
                const unresolved = new Set()
                const next = String(payload || "").replace(
                  /\[(file|diff)\s+(name|path)=["']([^"']+)["']\]/gi,
                  (full, kind, key, pth) => {
                    if (!/(?:^|\/)vico_(?:backup|diff)_/i.test(pth)) {
                      return full
                    }
                    const recovered = recoverTransientPath(pth)
                    if (!recovered) {
                      unresolved.add(pth)
                      return full
                    }
                    changed = true
                    return `[${kind} ${key}="${recovered}"]`
                  },
                )
                return { next, changed, unresolved: Array.from(unresolved) }
              }
              const normalizedPayload = normalizeWritePayloadPaths(stepOutput)
              if (normalizedPayload.unresolved.length > 0) {
                hadStepError = true
                context += `\n[System Feedback] Invalid transient write paths detected: ${normalizedPayload.unresolved.join(", ")}.\n[System Feedback] Do NOT write vico_backup/vico_diff files. Use real project path only.\n`
                planMarkdown += `\n> *⚠️ Invalid transient write path detected. Replanning with real target file path.*\n`
                updateMessagesAssistant({
                  uniqueId: `assistant-${uniqueId}`,
                  content: planMarkdown,
                })
                break
              }
              if (normalizedPayload.changed) {
                stepOutput = normalizedPayload.next
                context +=
                  "\n[System Feedback] Transient write path was auto-normalized to real project file path (vico_backup/vico_diff -> original path).\n"
              }
              if (
                workflowMeta &&
                workflowMeta.forceFullRewriteFiles &&
                workflowMeta.forceFullRewriteFiles.size > 0
              ) {
                const forcedFiles = Array.from(
                  workflowMeta.forceFullRewriteFiles,
                )
                const blockedDiffFiles = forcedFiles.filter((f) =>
                  new RegExp(
                    `\\[diff\\s+(?:name|path)=["']${escapeRegExp(f)}["']\\]`,
                    "i",
                  ).test(stepOutput),
                )
                if (blockedDiffFiles.length > 0) {
                  hadStepError = true
                  context += `\n[System Feedback] Diff output was rejected for files requiring full overwrite: ${blockedDiffFiles.join(", ")}.\n[System Feedback] Replan and output [writeFile][file name=\"...\"]FULL_CONTENT[/file][/writeFile] for those files.\n`
                  planMarkdown += `\n> *⚠️ Diff blocked for: ${blockedDiffFiles.join(", ")}. Full file overwrite required. Replanning...*\n`
                  updateMessagesAssistant({
                    uniqueId: `assistant-${uniqueId}`,
                    content: planMarkdown,
                  })
                  break
                }
              }
              const readFileForWriteCheck = (filePath, timeoutMs = 10000) =>
                new Promise((resolve) => {
                  let handleMessage
                  const timeout = setTimeout(() => {
                    window.removeEventListener("message", handleMessage)
                    resolve(null)
                  }, timeoutMs)
                  handleMessage = (event) => {
                    if (
                      event.data.command === "readFileResult" &&
                      event.data.filePath === filePath
                    ) {
                      clearTimeout(timeout)
                      window.removeEventListener("message", handleMessage)
                      if (
                        event.data.resolvedPath &&
                        event.data.resolvedPath !== filePath
                      ) {
                        window.filePathCache.set(
                          filePath,
                          event.data.resolvedPath,
                        )
                      }
                      if (event.data.error) resolve(null)
                      else resolve(event.data.content || "")
                    }
                  }
                  window.addEventListener("message", handleMessage)
                  vscode.postMessage({ type: "readFile", filePath })
                })

              // Collect target files first so we can verify persistence after write.
              const targetFiles = new Set()
              const diffTargets = new Set()
              const targetFileRegex =
                /\[(?:file|diff)\s+(?:name|path)=["']([^"']+)["']/g
              const diffTargetRegex =
                /\[diff\s+(?:name|path)=["']([^"']+)["']/g
              let targetMatch
              while (
                (targetMatch = targetFileRegex.exec(stepOutput)) !== null
              ) {
                if (targetMatch[1]) {
                  targetFiles.add(targetMatch[1])
                  // Visual feedback for each file target
                  currentStepMarkdown += `\n  > *Targeting file:* ${targetMatch[1]}\n`
                }
              }
              updateMessagesAssistant({
                uniqueId: `assistant-${uniqueId}`,
                content: currentStepMarkdown,
              })
              let diffTargetMatch
              while ((diffTargetMatch = diffTargetRegex.exec(stepOutput)) !== null) {
                if (diffTargetMatch[1]) {
                  diffTargets.add(diffTargetMatch[1])
                }
              }
              const beforeSnapshot = new Map()
              for (const tPath of targetFiles) {
                let prev = window.fileContentMap.get(tPath)
                if (typeof prev !== "string") {
                  prev = await readFileForWriteCheck(tPath, 4000)
                }
                beforeSnapshot.set(
                  tPath,
                  typeof prev === "string" ? prev : null,
                )
              }

              // Wait for writeFile to finish to avoid race conditions with subsequent readFiles
              await new Promise((resolve, reject) => {
                let handleMessage
                let handleStop

                const timeout = setTimeout(() => {
                  window.removeEventListener("message", handleMessage)
                  window.removeEventListener("agent-stop", handleStop)
                  resolve()
                }, 10000)

                handleStop = () => {
                  clearTimeout(timeout)
                  window.removeEventListener("message", handleMessage)
                  window.removeEventListener("agent-stop", handleStop)
                  const err = new Error("Aborted by user")
                  err.name = "AbortError"
                  reject(err)
                }

                handleMessage = (event) => {
                  if (event.data.command === "writeFileFinished") {
                    clearTimeout(timeout)
                    window.removeEventListener("message", handleMessage)
                    window.removeEventListener("agent-stop", handleStop)
                    resolve()
                  }
                }
                window.addEventListener("message", handleMessage)
                window.addEventListener("agent-stop", handleStop)

                // Send the message inside the promise setup to ensure we don't miss the response
                // (though unlikely with JS event loop)
                vscode.postMessage({
                  type: "writeFile",
                  assistantMessage: stepOutput,
                })
              })

              const fileRegex = /\[file\s+(?:name|path)=["']([^"']+)["']\]/g
              let match
              while ((match = fileRegex.exec(stepOutput)) !== null) {
                const fName = match[1]
                // Hide memory.md from modified files list in chat
                if (!fName.endsWith("memory.md")) {
                  modifiedFiles.add(fName)
                }
              }
              if (workflowMeta && modifiedFiles.size > 0) {
                workflowMeta.changeVersion += 1
                workflowMeta.successfulVerificationCommands.clear()
              }

              // Extract and save file content for Open Diff button
              const fileContentRegex =
                /\[file name="([^"]+)"\]([\s\S]*?)\[\/file\]/g
              let contentMatch

              // Handle potential overlapping matches or multiple files in one block
              // We need to be careful with greedy matching in [\s\S]*? if there are multiple files
              // A safer approach might be to split by [file or just rely on the regex if well-formed

              // Let's try to match all occurrences
              const allContent = stepOutput
              let lastIndex = 0

              while (
                (contentMatch = fileContentRegex.exec(allContent)) !== null
              ) {
                const fPath = contentMatch[1]
                let fContent = contentMatch[2]

                // FIX: Strip markdown code blocks if the agent mistakenly included them inside [file] tags
                // This handles cases where the agent wraps code in ```typescript ... ``` inside [file] tags
                const trimmed = fContent.trim()
                if (trimmed.startsWith("```") && trimmed.endsWith("```")) {
                  // Remove the first ```... line and the last ``` line to get raw code
                  fContent = trimmed
                    .replace(/^```[^\n]*\n/, "")
                    .replace(/\n```$/, "")
                }

                window.fileContentMap.set(fPath, fContent)
                console.log(
                  `[webview] Stored content for ${fPath} (length: ${fContent.length})`,
                )

                // CRITICAL: Update context so the planner knows the file state
                context += `\nFile Content (${fPath}):\n${fContent}\n`
              }

              // Persistence check: read target files from disk and compare before/after.
              let writeRetryRequired = false
              const writeRetryFiles = new Set()
              for (const tPath of targetFiles) {
                const afterContent = await readFileForWriteCheck(tPath, 6000)
                if (typeof afterContent === "string") {
                  window.fileContentMap.set(tPath, afterContent)
                  context += `\nFile Content (${tPath}):\n${afterContent}\n`
                  if (
                    userRequestedVanillaNoFrameworkLocal &&
                    /\.(html|js|mjs|cjs|ts|tsx|jsx)$/i.test(tPath)
                  ) {
                    const bareImportMatches = [
                      ...afterContent.matchAll(
                        /(?:import\s+[^"'`]*from\s+|import\s*\()\s*["'`]([^"'`]+)["'`]/g,
                      ),
                    ]
                    const bareImports = Array.from(
                      new Set(
                        bareImportMatches
                          .map((m) => m[1])
                          .filter(
                            (spec) =>
                              spec &&
                              !spec.startsWith(".") &&
                              !spec.startsWith("/") &&
                              !/^https?:\/\//i.test(spec) &&
                              !/^data:/i.test(spec),
                          ),
                      ),
                    )
                    if (bareImports.length > 0) {
                      context += `\n[Write Feedback] Vanilla/no-framework request detected, but bare module import found in ${tPath}: ${bareImports.join(", ")}.\n[Write Feedback] Replace npm-style imports with CDN/browser script usage (for example, include hls.js from CDN and use window.Hls).\n`
                      if (workflowMeta && workflowMeta.forceFullRewriteFiles) {
                        workflowMeta.forceFullRewriteFiles.add(tPath)
                      }
                    }
                    const placeholderUrlPattern =
                      /\b(example\.com|your-[^"'\s>]*\.m3u8|final-[^"'\s>]*\.m3u8|placeholder[^"'\s>]*\.m3u8)\b/i
                    if (placeholderUrlPattern.test(afterContent)) {
                      context += `\n[Write Feedback] Placeholder stream URL detected in ${tPath}. Use the exact user-provided HLS URL, no placeholder/final URL text.\n`
                      if (workflowMeta && workflowMeta.forceFullRewriteFiles) {
                        workflowMeta.forceFullRewriteFiles.add(tPath)
                      }
                    }
                    if (
                      requestedUrlsLocal.length > 0 &&
                      !requestedUrlsLocal.some((u) => afterContent.includes(u))
                    ) {
                      context += `\n[Write Feedback] Required literal URL missing in ${tPath}. Insert exact URL from prompt: ${requestedUrlsLocal.join(", ")}.\n`
                      if (workflowMeta && workflowMeta.forceFullRewriteFiles) {
                        workflowMeta.forceFullRewriteFiles.add(tPath)
                      }
                    }
                    if (
                      !/\bfinal\b/i.test(message || "") &&
                      />\s*[^<]*\bfinal\b[^<]*</i.test(afterContent)
                    ) {
                      context += `\n[Write Feedback] Unexpected word 'Final' found in UI copy in ${tPath}. Remove it unless explicitly requested.\n`
                      if (workflowMeta && workflowMeta.forceFullRewriteFiles) {
                        workflowMeta.forceFullRewriteFiles.add(tPath)
                      }
                    }
                    const metaConstraintLeakPattern =
                      /\b(no framework|tanpa framework|without framework|vanilla)\b/i
                    if (metaConstraintLeakPattern.test(afterContent)) {
                      context += `\n[Write Feedback] Prompt meta constraint leaked into output in ${tPath} (e.g., 'no framework'/'vanilla'). Remove these phrases; keep output production-ready.\n`
                      if (workflowMeta && workflowMeta.forceFullRewriteFiles) {
                        workflowMeta.forceFullRewriteFiles.add(tPath)
                      }
                    }
                  }
                  if (/\.(tsx|jsx)$/i.test(tPath)) {
                    const badImportMatches = [
                      ...afterContent.matchAll(
                        /from\s+["']([^"']*(?:vico_backup_|vico_diff_)[^"']*)["']/g,
                      ),
                    ]
                    if (badImportMatches.length > 0) {
                      const badImports = badImportMatches.map((m) => m[1])
                      context += `\n[Write Feedback] Invalid transient import path detected in ${tPath}: ${badImports.join(", ")}. Replace with real source path (e.g., components/*), never import vico_backup/vico_diff files.\n`
                      if (workflowMeta && workflowMeta.forceFullRewriteFiles) {
                        workflowMeta.forceFullRewriteFiles.add(tPath)
                      }
                    }
                    const jsxTags = Array.from(
                      new Set(
                        [
                          ...afterContent.matchAll(/<([A-Z][A-Za-z0-9_]*)\b/g),
                        ].map((m) => m[1]),
                      ),
                    )
                    const maybeMissingImports = jsxTags.filter((tag) => {
                      if (["Fragment"].includes(tag)) return false
                      const importRegex = new RegExp(
                        `import\\s+[^\\n]*\\b${tag}\\b[^\\n]*from\\s+["'][^"']+["']`,
                      )
                      return !importRegex.test(afterContent)
                    })
                    if (maybeMissingImports.length > 0) {
                      context += `\n[Write Feedback] JSX components used without explicit import in ${tPath}: ${maybeMissingImports.join(", ")}. Add imports before running build.\n`
                    }
                  }
                  const before = beforeSnapshot.get(tPath)
                  const normalizeForPersistCompare = (s) =>
                    String(s || "").replace(/\r\n/g, "\n")
                  const unchangedAfterWrite =
                    typeof before === "string" &&
                    normalizeForPersistCompare(before) ===
                    normalizeForPersistCompare(afterContent)
                  if (unchangedAfterWrite) {
                    const diffLikelyFailed = diffTargets.has(tPath)
                    if (workflowMeta && workflowMeta.failedWriteCounts) {
                      const failedCount =
                        (workflowMeta.failedWriteCounts.get(tPath) || 0) + 1
                      workflowMeta.failedWriteCounts.set(tPath, failedCount)
                      if (
                        failedCount >= 2 &&
                        workflowMeta.forceFullRewriteFiles
                      ) {
                        workflowMeta.forceFullRewriteFiles.add(tPath)
                      }
                    }
                    if (diffLikelyFailed) {
                      writeRetryRequired = true
                      writeRetryFiles.add(tPath)
                    }
                    const warningKey = `${workflowMeta?.changeVersion ?? 0}:${tPath}`
                    if (
                      !workflowMeta ||
                      !workflowMeta.writePersistenceWarningsByVersion ||
                      !workflowMeta.writePersistenceWarningsByVersion.has(
                        warningKey,
                      )
                    ) {
                      context += `\n[Write Feedback] No persisted change detected for ${tPath} after write/diff.\n[Write Feedback] Do NOT scaffold/init again. Keep working on current project files.\n[Write Feedback] Retry once with full overwrite only if this happens again for same code version.\n`
                      if (
                        workflowMeta &&
                        workflowMeta.writePersistenceWarningsByVersion
                      ) {
                        workflowMeta.writePersistenceWarningsByVersion.add(
                          warningKey,
                        )
                      }
                    }
                  } else {
                    if (workflowMeta && workflowMeta.failedWriteCounts) {
                      workflowMeta.failedWriteCounts.delete(tPath)
                      if (workflowMeta.forceFullRewriteFiles) {
                        workflowMeta.forceFullRewriteFiles.delete(tPath)
                      }
                      if (workflowMeta.writePersistenceWarningsByVersion) {
                        workflowMeta.writePersistenceWarningsByVersion.delete(
                          `${workflowMeta.changeVersion}:${tPath}`,
                        )
                      }
                    }
                    context += `\n[Write Feedback] Persisted change confirmed for ${tPath}.\n`
                  }
                } else {
                  context += `\n[Write Feedback] Unable to read ${tPath} after write.\n[Write Feedback] Do NOT scaffold/init again. Resolve correct path first (e.g., components/VideoPlayer.tsx vs VideoPlayer.tsx), then use full [file] overwrite for that resolved path.\n`
                }
              }
              if (writeRetryRequired) {
                const retryList = Array.from(writeRetryFiles)
                hadStepError = true
                if (workflowMeta && workflowMeta.forceFullRewriteFiles) {
                  retryList.forEach((f) => workflowMeta.forceFullRewriteFiles.add(f))
                }
                context +=
                  `\n[Write Feedback] Diff apply failed for: ${retryList.join(", ")}.\n` +
                  retryList
                    .map(
                      (f) =>
                        `[Write Feedback] Could not apply changes to ${f}. SEARCH block not found (exact/eol/trimmed match failed).`,
                    )
                    .join("\n") +
                  `\n[Write Feedback] Retry required: use [writeFile][file name=\"...\"]FULL_CONTENT[/file][/writeFile] (full overwrite) for those files.\n`
                planMarkdown += `\n> *⚠️ Diff apply failed (${retryList.join(", ")}). Auto-retry will replan with full file overwrite.*\n`
                updateMessagesAssistant({
                  uniqueId: `assistant-${uniqueId}`,
                  content: planMarkdown,
                })
                break
              }
              const writeTargets = Array.from(targetFiles)
              if (writeTargets.length > 0) {
                planMarkdown += buildTerminalBlock(
                  "writeFile",
                  `targets:\n${writeTargets.map((f) => `- ${f}`).join("\n")}`,
                  "success",
                )
                updateMessagesAssistant({
                  uniqueId: `assistant-${uniqueId}`,
                  content: planMarkdown,
                })
              }
            }
            if (stepOutput.includes("[command]")) {
              const commandMatch = stepOutput.match(
                /\[command\]([\s\S]*?)\[\/command\]/,
              )
              if (commandMatch) {
                const command = commandMatch[1].trim()
                const commandKey = `${workflowMeta?.changeVersion ?? 0}::${normalizeSignatureText(command)}`
                if (
                  workflowMeta &&
                  workflowMeta.commandAttemptCountsByVersion
                ) {
                  const prevCmd =
                    workflowMeta.commandAttemptCountsByVersion.get(
                      commandKey,
                    ) || 0
                  const nextCmd = prevCmd + 1
                  workflowMeta.commandAttemptCountsByVersion.set(
                    commandKey,
                    nextCmd,
                  )
                  if (
                    nextCmd >= 3 &&
                    !isVerificationCommand(command) &&
                    !isDiscoveryCommand(command)
                  ) {
                    hadStepError = true
                    context += `\n[Loop Guard] Command "${command}" was repeated ${nextCmd} times for same code version. Stop repeating it.\n[Loop Guard] Next plan must choose a different fix action (usually file changes) before any further command.\n`
                    planMarkdown += `\n> *⚠️ Loop guard: repeated command skipped (${nextCmd}x): \`${command}\`.*\n`
                    updateMessagesAssistant({
                      uniqueId: `assistant-${uniqueId}`,
                      content: planMarkdown,
                    })
                    break
                  }
                }
                const verificationCommand = isVerificationCommand(command)
                const discoveryCommand = isDiscoveryCommand(command)
                if (discoveryCommand && workflowMeta) {
                  const versionKey = workflowMeta.changeVersion
                  const usedCount =
                    workflowMeta.discoveryRunsByVersion.get(versionKey) || 0
                  if (usedCount >= 1) {
                    planMarkdown += `\n> *ℹ️ Discovery command skipped: project structure is already known for current code state. Continuing implementation.*\n`
                    context += `\n[System Feedback] Skipped repeated discovery command "${command}". Do not repeatedly run ls/dir/tree/find. Use existing context and continue coding.\n`
                    updateMessagesAssistant({
                      uniqueId: `assistant-${uniqueId}`,
                      content: planMarkdown,
                    })
                    continue
                  }
                  workflowMeta.discoveryRunsByVersion.set(
                    versionKey,
                    usedCount + 1,
                  )
                }
                if (verificationCommand && isSimpleVanillaTask) {
                  planMarkdown += `\n> *?? Verification command skipped for simple vanilla task: \`${command}\`.*\n`
                  context += `\n[System Feedback] Skipped verification command "${command}" for simple vanilla request to avoid unnecessary integration/test loops. Rely on persisted file-write validation and complete.\n`
                  updateMessagesAssistant({
                    uniqueId: `assistant-${uniqueId}`,
                    content: planMarkdown,
                  })
                  continue
                }
                if (verificationCommand && workflowMeta) {
                  if (workflowMeta.changeVersion === 0) {
                    planMarkdown += `\n> *ℹ️ Verification deferred: no implementation change yet. Continuing coding steps first.*\n`
                    context += `\n[System Feedback] Verification command "${command}" was skipped because no code changes were made yet. Put verification at the end after implementation changes.\n`
                    updateMessagesAssistant({
                      uniqueId: `assistant-${uniqueId}`,
                      content: planMarkdown,
                    })
                    continue
                  }
                  if (
                    workflowMeta.lastVerifiedVersion ===
                    workflowMeta.changeVersion &&
                    workflowMeta.successfulVerificationCommands.has(command)
                  ) {
                    planMarkdown += `\n> *ℹ️ Verification skipped: "${command}" already succeeded for current code state.*\n`
                    context += `\n[System Feedback] Skipped duplicate verification command "${command}" because it already passed for current code state.\n`
                    updateMessagesAssistant({
                      uniqueId: `assistant-${uniqueId}`,
                      content: planMarkdown,
                    })
                    continue
                  }
                }

                let terminalOutput = ""
                planMarkdown += `\n  > *Running command:* \`${command}\`\n`
                updateMessagesAssistant({
                  uniqueId: `assistant-${uniqueId}`,
                  content:
                    planMarkdown + buildTerminalBlock(command, "", "running"),
                })

                // Request execution and wait for completion
                const exitCode = await new Promise((resolve, reject) => {
                  let handleMessage
                  let handleStop

                  handleStop = () => {
                    window.removeEventListener("message", handleMessage)
                    window.removeEventListener("agent-stop", handleStop)
                    const err = new Error("Aborted by user")
                    err.name = "AbortError"
                    reject(err)
                  }

                  handleMessage = (event) => {
                    if (event.data.command === "commandOutput") {
                      terminalOutput += event.data.output
                      updateMessagesAssistant({
                        uniqueId: `assistant-${uniqueId}`,
                        content:
                          planMarkdown +
                          buildTerminalBlock(
                            command,
                            terminalOutput,
                            "running",
                          ),
                      })
                    }
                    if (event.data.command === "commandFinished") {
                      window.removeEventListener("message", handleMessage)
                      window.removeEventListener("agent-stop", handleStop)

                      // Add note about external terminal if we didn't capture much output
                      if (terminalOutput.trim().length === 0) {
                        terminalOutput += "(See VS Code Terminal for output)"
                      }

                      // Use output from event if available (from child_process workaround), otherwise fallback to captured terminal output
                      if (event.data.output) {
                        terminalOutput = event.data.output
                      }

                      if (event.data.exitCode !== 0) {
                        console.error(
                          `Command failed with exit code ${event.data.exitCode}`,
                        )
                        terminalOutput += `\n\n[Process exited with code ${event.data.exitCode}]`
                      } else {
                        terminalOutput += `\n\n[Process completed successfully]`
                      }

                      // Safety truncation for large outputs to prevent context overflow
                      if (terminalOutput.length > 500000) {
                        terminalOutput =
                          terminalOutput.slice(0, 500000) +
                          "\n... [Output truncated (too large for context). Please refine command with exclusions.]"
                      }

                      // Final update with full output
                      updateMessagesAssistant({
                        uniqueId: `assistant-${uniqueId}`,
                        content:
                          planMarkdown +
                          buildTerminalBlock(
                            command,
                            terminalOutput,
                            event.data.exitCode === 0 ? "success" : "error",
                          ),
                      })

                      // CRITICAL: Update context so the planner knows the command result
                      context += `\nCommand Output for "${command}":\n${terminalOutput}\n`

                      resolve(event.data.exitCode)
                    }
                    // Handle commandStopped event from SidebarProvider
                    if (event.data.command === "commandStopped") {
                      window.removeEventListener("message", handleMessage)
                      window.removeEventListener("agent-stop", handleStop)
                      terminalOutput += `\n\n[Process stopped by user]`

                      updateMessagesAssistant({
                        uniqueId: `assistant-${uniqueId}`,
                        content:
                          planMarkdown +
                          buildTerminalBlock(command, terminalOutput, "error"),
                      })

                      const err = new Error("Aborted by user")
                      err.name = "AbortError"
                      reject(err)
                    }
                  }
                  window.addEventListener("message", handleMessage)
                  window.addEventListener("agent-stop", handleStop)
                  vscode.postMessage({ type: "executeCommand", command })
                })

                planMarkdown += buildTerminalBlock(
                  command,
                  terminalOutput,
                  exitCode === 0 ? "success" : "error",
                )
                if (verificationCommand && workflowMeta && exitCode === 0) {
                  workflowMeta.lastVerifiedVersion = workflowMeta.changeVersion
                  workflowMeta.successfulVerificationCommands.add(command)
                }
                if (
                  workflowMeta &&
                  exitCode === 0 &&
                  /\bnpx\s+create-next-app\b/i.test(command)
                ) {
                  workflowMeta.scaffoldDone = true
                }

                // Auto-Terminal-Fixing Logic
                if (exitCode !== 0) {
                  const isAlreadyScaffoldedError =
                    /Blocked:\s*workspace already has dependency file/i.test(
                      terminalOutput,
                    ) || /already scaffolded/i.test(terminalOutput)
                  const isScaffoldMissingError =
                    /Blocked:\s*workspace has no dependency file yet/i.test(
                      terminalOutput,
                    )
                  const isPackageJsonParseError =
                    /EJSONPARSE|Invalid package\.json|package\.json must be actual JSON/i.test(
                      terminalOutput,
                    )
                  const missingNameMatch =
                    /Cannot find name '([A-Za-z0-9_]+)'/i.exec(terminalOutput)
                  const missingSymbol = missingNameMatch
                    ? missingNameMatch[1]
                    : ""
                  const isMissingImportError =
                    !!missingSymbol && /^[A-Z]/.test(missingSymbol)
                  if (isAlreadyScaffoldedError) {
                    context += `\n[System Feedback] Scaffold command was attempted again but project is already initialized. Skip scaffold and continue implementation/build/test only.\n`
                    planMarkdown += `\n> *ℹ️ Scaffold skipped: project already initialized. Continuing with implementation.*\n`
                    updateMessagesAssistant({
                      uniqueId: `assistant-${uniqueId}`,
                      content: planMarkdown,
                    })
                    continue
                  }
                  autoFixTriggered = true
                  hadStepError = true
                  const failureGuidance = isScaffoldMissingError
                    ? userRequestedVanillaNoFrameworkLocal
                      ? `\n[System Feedback] Command "${command}" was blocked because no dependency manifest exists.\n[System Feedback] User explicitly requested NO FRAMEWORK/vanilla web. Do NOT scaffold Next.js.\n[System Feedback] Continue with direct file edits (index.html/script.js/styles.css) and avoid npm build/dev unless explicitly required.\n`
                      : `\n[System Feedback] Command "${command}" was blocked because workspace is not scaffolded yet.\n[System Feedback] NEXT PLAN MUST start with scaffold command:\n[System Feedback] [command] npx create-next-app . --yes --ts --eslint --tailwind --app --use-npm [/command]\n[System Feedback] Do not run npm install/build/test/dev before scaffold succeeds.\n`
                    : isPackageJsonParseError
                      ? `\n[System Feedback] Command "${command}" failed with JSON parse error in package.json.\n[System Feedback] Do not rerun build/test/install first. Read package.json, remove comments/trailing commas/invalid JSON syntax, then validate JSON and retry the original command.\n`
                      : isMissingImportError
                        ? `\n[System Feedback] Build failed with missing symbol '${missingSymbol}'. This usually means JSX/component is used without import.\n[System Feedback] Fix code FIRST: add/import '${missingSymbol}' in the relevant file (likely app/page.tsx) or use correct component name/export.\n[System Feedback] Do NOT rerun build until file_write fixes are applied.\n`
                        : `\n[System Feedback] Command "${command}" failed (exit ${exitCode}). Analyze terminal output, apply concrete fix, then retry once and continue original request.\n`

                  context += failureGuidance

                  if (isScaffoldMissingError) {
                    planMarkdown += `\n> *⚠️ Command blocked: project not scaffolded. Agent will scaffold framework first, then continue.*\n`
                  } else if (isPackageJsonParseError) {
                    planMarkdown += `\n> *⚠️ Command failed: package.json is invalid JSON. Agent will fix package.json before retrying build/test/install.*\n`
                  } else if (isMissingImportError) {
                    planMarkdown += `\n> *⚠️ Build failed: missing import/symbol '${missingSymbol}'. Agent will fix file imports/exports before retrying build.*\n`
                  } else {
                    planMarkdown += `\n> *⚠️ Command failed. Agent will fix the root cause and replan in the next iteration.*\n`
                  }
                  updateMessagesAssistant({
                    uniqueId: `assistant-${uniqueId}`,
                    content: planMarkdown,
                  })

                  const errorRegex = new RegExp(
                    `^\\s*-\\s*\\[🔄\\]\\s*(Step\\s+${stepNum}:)`,
                    "gm",
                  )
                  planMarkdown = planMarkdown.replace(errorRegex, `- [❌] $1`)
                  planMarkdown += `\n  > *Step ${stepNum} Failed. Recovery plan will be generated automatically in the next iteration.*\n`

                  // Update global plan status to Failed
                  if (window.currentPlanMarkdown) {
                    window.currentPlanMarkdown =
                      window.currentPlanMarkdown.replace(
                        errorRegex,
                        `- [❌] Step ${stepNum}:`,
                      )
                    updatePlanPopup(window.currentPlanMarkdown)
                    updatePlanButtonTitle(window.currentPlanMarkdown)
                  }

                  updateMessagesAssistant({
                    uniqueId: `assistant-${uniqueId}`,
                    content: planMarkdown,
                  })

                  // Stop this plan and let the next iteration recover with enriched context
                  break
                }
              }
            }

            const hasWriteTag = /\[(?:writeFile|writeFileVico)\]/i.test(
              stepOutput,
            )
            const hasCommandTag = /\[command\]/i.test(stepOutput)
            const hasReplanTag = /\[REPLAN\]/i.test(stepOutput)
            const rawStepType = String(step?.type || "").toLowerCase()
            const currentStepType =
              rawStepType === "command" ? "terminal_command" : rawStepType
            const looksLikeJsonPlan =
              /"plan"\s*:\s*\[/.test(stepOutput) &&
              /"type"\s*:\s*"file_write"/i.test(stepOutput)

            // Fail-fast for action steps: prevent false "done" when model returns planning JSON/non-executable text.
            if (!hasReplanTag) {
              if (currentStepType === "file_write" && !hasWriteTag) {
                hadStepError = true
                context +=
                  `\n[System Feedback] Invalid execute output for file_write step: missing [writeFile] block.\n` +
                  `[System Feedback] Return executable write payload only: [writeFile][file name="..."]...[/file][/writeFile] or [writeFile][diff name="..."]...[/diff][/writeFile].\n` +
                  (looksLikeJsonPlan
                    ? `[System Feedback] Previous output was JSON plan text, not execution payload.\n`
                    : "")
                planMarkdown += `\n> *⚠️ Invalid execute output: file_write step returned non-write content. Replanning...*\n`
                updateMessagesAssistant({
                  uniqueId: `assistant-${uniqueId}`,
                  content: planMarkdown,
                })

                const errorRegex = new RegExp(
                  `^\\s*-\\s*\\[ðŸ”„\\]\\s*(Step\\s+${stepNum}:)`,
                  "gm",
                )
                planMarkdown = planMarkdown.replace(errorRegex, `- [âŒ] $1`)
                planMarkdown += `\n  > *Step ${stepNum} Failed. Recovery plan will be generated automatically in the next iteration.*\n`
                if (window.currentPlanMarkdown) {
                  window.currentPlanMarkdown =
                    window.currentPlanMarkdown.replace(
                      errorRegex,
                      `- [âŒ] Step ${stepNum}:`,
                    )
                  updatePlanPopup(window.currentPlanMarkdown)
                  updatePlanButtonTitle(window.currentPlanMarkdown)
                }
                updateMessagesAssistant({
                  uniqueId: `assistant-${uniqueId}`,
                  content: planMarkdown,
                })
                break
              }

              if (currentStepType === "terminal_command" && !hasCommandTag) {
                hadStepError = true
                context +=
                  `\n[System Feedback] Invalid execute output for terminal_command step: missing [command] block.\n` +
                  `[System Feedback] Return exactly one [command]...[/command] block.\n`
                planMarkdown += `\n> *⚠️ Invalid execute output: terminal_command step returned non-command content. Replanning...*\n`
                updateMessagesAssistant({
                  uniqueId: `assistant-${uniqueId}`,
                  content: planMarkdown,
                })

                const errorRegex = new RegExp(
                  `^\\s*-\\s*\\[ðŸ”„\\]\\s*(Step\\s+${stepNum}:)`,
                  "gm",
                )
                planMarkdown = planMarkdown.replace(errorRegex, `- [âŒ] $1`)
                planMarkdown += `\n  > *Step ${stepNum} Failed. Recovery plan will be generated automatically in the next iteration.*\n`
                if (window.currentPlanMarkdown) {
                  window.currentPlanMarkdown =
                    window.currentPlanMarkdown.replace(
                      errorRegex,
                      `- [âŒ] Step ${stepNum}:`,
                    )
                  updatePlanPopup(window.currentPlanMarkdown)
                  updatePlanButtonTitle(window.currentPlanMarkdown)
                }
                updateMessagesAssistant({
                  uniqueId: `assistant-${uniqueId}`,
                  content: planMarkdown,
                })
                break
              }
            }

            // After loop
            if (autoFixTriggered) break

            // Update to Done - use more flexible regex
            const doneRegex = new RegExp(
              `^\\s*-\\s*\\[🔄\\]\\s*(Step\\s+${stepNum}:)`,
              "gm",
            )
            planMarkdown = planMarkdown.replace(doneRegex, `- [✅] $1`)
            updatePlanPopup(window.currentPlanMarkdown)
            updatePlanButtonTitle(window.currentPlanMarkdown)

            // Extract reasoning
            const reasoningMatch = stepOutput.match(
              /\*\*Reasoning:\*\*([\s\S]*?)(?=\*\*Action:|$)/,
            )
            const reasoning = reasoningMatch
              ? reasoningMatch[1].trim()
              : "Executed."

            planMarkdown += `\n  > *Step ${stepNum}:* ${reasoning}\n`
            updateMessagesAssistant({
              uniqueId: `assistant-${uniqueId}`,
              content: planMarkdown,
            })
            updatePlanPopup(window.currentPlanMarkdown)

            // Re-inject modified files diff buttons at the end of EACH step to ensure they are available
            // This is optional but helps if user wants to see diffs incrementally
          } catch (err) {
            if (err.name === "AbortError") {
              updateMessagesAssistant({
                uniqueId: `assistant-${uniqueId}`,
                content: planMarkdown + `\n  > *Stopped by user.*`,
              })
              throw err
            }
            pushStepHistory(
              stepNum,
              step.description,
              `Error: ${err.message}`,
              "error",
            )
            const errorRegex = new RegExp(
              `^\\s*-\\s*\\[🔄\\]\\s*(Step\\s+${stepNum}:)`,
              "gm",
            )
            planMarkdown = planMarkdown.replace(errorRegex, `- [❌] $1`)
            planMarkdown += `\n  > *Step ${stepNum} Error:* ${err.message}\n`
            hadStepError = true

            // Update global plan status to Failed
            if (window.currentPlanMarkdown) {
              window.currentPlanMarkdown = window.currentPlanMarkdown.replace(
                errorRegex,
                `- [❌] Step ${stepNum}:`,
              )
            }

            updateMessagesAssistant({
              uniqueId: `assistant-${uniqueId}`,
              content: planMarkdown,
            })
