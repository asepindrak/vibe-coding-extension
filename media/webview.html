      function saveState() {
        vscode.setState({
          messagesHTML: document.getElementById("content").innerHTML,
          input: document.getElementById("messageInput")?.value ?? "",
          token: localStorage.getItem("token"),
          userId: localStorage.getItem("userId"),
          messages: messageArray,
          mode: document.getElementById("modeSelect")?.value ?? "agent",
          model: ensureSupportedModel(
            document.getElementById("modelSelect")?.value ??
            currentAiSettings.selectedModel ??
            "gpt-5.1-codex-mini",
          ),
          currentSessionId: currentSessionId,
        })

        // Notify extension about the current session ID
        vscode.postMessage({
          type: "currentSessionId",
          sessionId: currentSessionId,
        })

        // Also trigger save history to extension if we have messages
        if (messageArray.length > 0) {
          saveCurrentChatToHistory()
        }
      }

      function saveCurrentChatToHistory() {
        const title =
          messageArray.length > 0
            ? messageArray[0].content.substring(0, 30) + "..."
            : "New Chat"

        const historyItem = {
          id: currentSessionId,
          title: title,
          timestamp: Date.now(),
          messages: messageArray,
          mode: document.getElementById("modeSelect")?.value ?? "agent",
        }

        // Optimistically update local history if available
        if (window.chatHistory) {
          const existingIndex = window.chatHistory.findIndex(
            (h) => h.id === currentSessionId,
          )
          if (existingIndex >= 0) {
            window.chatHistory[existingIndex] = historyItem
          } else {
            window.chatHistory.unshift(historyItem) // Add to top
          }
          // Trim history if too long?
          if (window.chatHistory.length > 50) {
            window.chatHistory = window.chatHistory.slice(0, 50)
          }
        }

        vscode.postMessage({
          type: "saveHistoryItem",
          item: historyItem,
        })
      }

      var isInitialized = false
      function startNewChat(skipSave = false) {
        try {
          if (isLoading) {
            // Force stop if user confirmed new chat while loading
            isLoading = false
            if (agentAbortController) {
              agentAbortController.abort()
              agentAbortController = null
            }
            const btnStop = document.getElementById("button-stop")
            const btnSend = document.getElementById("button-send")
            const loader = document.getElementById("loader")
            if (btnStop) btnStop.classList.add("hidden")
            if (btnSend) btnSend.classList.remove("hidden")
            if (loader) loader.classList.add("hidden")
          }

          if (messageArray.length > 0 && !skipSave) {
            try {
              saveCurrentChatToHistory()
            } catch (e) {
              console.error("Failed to save history:", e)
            }
          }

          // Reset state
          currentSessionId = Date.now().toString()
          messageArray = []
          const content = document.getElementById("content")
          if (content) content.innerHTML = ""
          const msgInput = document.getElementById("messageInput")
          if (msgInput) msgInput.value = ""
          const generating = document.getElementById("generating")
          if (generating) generating.innerHTML = ""

          // Clear attachments
          attachments = []
          renderAttachments()

          // Reset plan button and status
          const planButton = document.getElementById("planButton")
          if (planButton) planButton.style.display = "none"
          const planStatusContainer = document.getElementById(
            "planStatusContainer",
          )
          if (planStatusContainer) planStatusContainer.classList.add("hidden")
          const planStatusContent =
            document.getElementById("planStatusContent")
          if (planStatusContent) planStatusContent.innerHTML = ""

          window.fileContentMap.clear()
          window.filePathCache.clear()
          cachedProjectContext = ""
          cachedContextVersion = -1
          selectedContextRefs = []

          // Mark as initialized to prevent tokenValid from restoring old session state
          isInitialized = true

          // Clear extension coding history
          vscode.postMessage({
            command: "clearCodingHistory",
          })

          saveState()
        } catch (e) {
          console.error("Error in startNewChat:", e)
          vscode.postMessage({
            command: "error",
            error: "Failed to reset chat: " + e.message,
          })
        }
      }

      function loadHistorySession(sessionId) {
        const session = window.chatHistory.find((h) => h.id === sessionId)
        if (!session) return

        if (isLoading) {
          if (!confirm("Agent is working. Stop and load history?")) return
          isLoading = false
          if (agentAbortController) {
            agentAbortController.abort()
            agentAbortController = null
          }
          const btnStop = document.getElementById("button-stop")
          const btnSend = document.getElementById("button-send")
          const loader = document.getElementById("loader")
          if (btnStop) btnStop.classList.add("hidden")
          if (btnSend) btnSend.classList.remove("hidden")
          if (loader) loader.classList.add("hidden")
        }

        // Save current before switching?
        if (messageArray.length > 0) {
          saveCurrentChatToHistory()
        }

        currentSessionId = session.id
        messageArray = session.messages || []
        window.fileContentMap.clear()
        window.filePathCache.clear()
        cachedProjectContext = ""
        cachedContextVersion = -1
        selectedContextRefs = []
        attachments = []
        renderAttachments()

        // Mark as initialized to prevent tokenValid from restoring old session state
        isInitialized = true

        // Re-render messages
        const contentDiv = document.getElementById("content")
        contentDiv.innerHTML = ""

        messageArray.forEach((msg) => {
          if (msg.isHidden) return
          // We need to re-render bubbles.
          // Since we don't have the HTML stored in history (only content), we use displayMessagesAssistant/User
          // But those functions append to DOM.

          if (msg.role === "user") {
            const uniqueId = Date.now() + Math.random()
            displayMessagesAssistant({
              role: "user",
              content: msg.content,
              uniqueId,
            })
          } else {
            const uniqueId = Date.now() + Math.random()
            displayMessagesAssistant({
              role: "assistant",
              content: msg.content,
              uniqueId,
            })
          }
        })

        // Restore mode
        const modeSelect = document.getElementById("modeSelect")
        if (modeSelect && session.mode) {
          modeSelect.value = session.mode
        }

        // Hide history popup
        document.getElementById("historyPopup").style.display = "none"
        saveState()
      }

      function deleteHistorySession(sessionId) {
        if (!window.chatHistory) return
        window.chatHistory = window.chatHistory.filter(
          (h) => h.id !== sessionId,
        )
        vscode.postMessage({
          type: "deleteHistoryItem",
          id: sessionId,
        })
        renderHistoryList()
        // If deleted current session, start new chat?
        if (sessionId === currentSessionId) {
          startNewChat(true)
        }
      }

      function renderHistoryList() {
        const listContainer = document.getElementById("historyList")
        listContainer.innerHTML = ""

        if (!window.chatHistory || window.chatHistory.length === 0) {
          listContainer.innerHTML =
            '<div class="p-4 text-center text-gray-500 text-sm">No history found</div>'
          return
        }

        window.chatHistory.forEach((item) => {
          const date = new Date(item.timestamp).toLocaleString()
          const div = document.createElement("div")
          div.className = "history-item group"
          div.onclick = () => loadHistorySession(item.id)

          const infoDiv = document.createElement("div")
          infoDiv.className = "history-info"

          const title = document.createElement("span")
          title.className = "history-title"
          title.textContent = item.title || "Untitled Chat"

          const meta = document.createElement("span")
          meta.className = "history-date"
          meta.textContent = date

          infoDiv.appendChild(title)
          infoDiv.appendChild(meta)

          // Delete button
          const deleteBtn = document.createElement("button")
          deleteBtn.className = "history-delete-btn"
          deleteBtn.title = "Delete Chat"
          deleteBtn.innerHTML = `
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
            </svg>
          `
          deleteBtn.onclick = (e) => {
            e.stopPropagation()
            // Removed confirm dialog as it might block the webview
            deleteHistorySession(item.id)
          }

          div.appendChild(infoDiv)
          div.appendChild(deleteBtn)
          listContainer.appendChild(div)
        })
      }

      // Auto-resize textarea
      const messageInput = document.getElementById("messageInput")
      messageInput.addEventListener("input", function () {
        this.style.height = "auto"
        this.style.height = this.scrollHeight + "px"
        // Max height constraint handled by CSS
        if (this.value === "") {
          this.style.height = "auto"
        }
      })

      document.addEventListener("DOMContentLoaded", function () {
        // Always request history on load to ensure window.chatHistory is populated
        vscode.postMessage({ type: "getHistory" })

        const token = localStorage.getItem("token")
        const userId = localStorage.getItem("userId")
        const modeSelect = document.getElementById("modeSelect")
        const modelSelect = document.getElementById("modelSelect")
        const apiKeyButton = document.getElementById("apiKeyButton")
        const messageInput = document.getElementById("messageInput")
        function updatePlaceholder() {
          const mode = modeSelect ? modeSelect.value : "agent"
          if (mode === "agent") {
            messageInput.placeholder = "Describe a task for the Agent…"
          } else {
            messageInput.placeholder = "Ask a question or start chatting…"
          }
        }
        if (modeSelect) {
          modeSelect.addEventListener("change", updatePlaceholder)
        }
        setupAuxStatusAutoVisibility()
        if (modelSelect) {
          modelSelect.addEventListener("change", () => {
            const requestedModel = ensureSupportedModel(
              modelSelect.value || "gpt-5.1-codex-mini",
            )
            if (
              !currentAiSettings.hasUserApiKey &&
              !isFreeQuotaModel(requestedModel)
            ) {
              modelSelect.value = resolveAllowedModelOrFallback(
                currentAiSettings.selectedModel,
              )
              currentAiSettings.selectedModel = modelSelect.value
              openApiKeyModal()
              return
            }
            currentAiSettings.selectedModel = requestedModel
            lastAllowedModel = requestedModel
            vscode.postMessage({
              type: "saveAiSettings",
              model: currentAiSettings.selectedModel,
              userApiKey: "",
              keepExistingApiKey: true,
            })
          })
        }
        if (apiKeyButton) {
          apiKeyButton.style.pointerEvents = "auto"
          apiKeyButton.addEventListener("click", () => openApiKeyModal())
        }
        const apiKeyModal = document.getElementById("apiKeyModal")
        const apiKeyCancelBtn = document.getElementById("apiKeyCancelBtn")
        const apiKeySaveBtn = document.getElementById("apiKeySaveBtn")
        const apiKeyInput = document.getElementById("apiKeyInput")
        if (apiKeyCancelBtn) {
          apiKeyCancelBtn.addEventListener("click", () => closeApiKeyModal())
        }
        if (apiKeySaveBtn) {
          apiKeySaveBtn.addEventListener("click", () =>
            submitApiKeyFromModal(),
          )
        }
        if (apiKeyInput) {
          apiKeyInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
              e.preventDefault()
              submitApiKeyFromModal()
            } else if (e.key === "Escape") {
              closeApiKeyModal()
            }
          })
        }
        if (apiKeyModal) {
          apiKeyModal.addEventListener("click", (e) => {
            if (e.target === apiKeyModal) {
              closeApiKeyModal()
            }
          })
        }
        vscode.postMessage({ type: "getAiSettings" })
        updatePlaceholder()
        hideWorkspacePrompt()
        if (token && userId) {
          vscode.postMessage({ type: "validateToken", token, userId })
        } else {
          // Clear state if no token
          vscode.setState(undefined)
          showLoginForm()
        }
        const sendMessageButton = document.getElementById("sendMessageButton")
        sendMessageButton.addEventListener("click", handleSendMessage)
        const btnWorkspace = document.getElementById("button-workspace")
        if (btnWorkspace) {
          btnWorkspace.style.display = "none"
        }
        const logoutButton = document.getElementById("logoutButton")
        logoutButton.addEventListener("click", logout)

        const newChatButton = document.getElementById("newChatButton")
        if (newChatButton) {
          newChatButton.addEventListener("click", () => {
            // Remove confirm for now to test if it's blocking
            // if (confirm("Start a new chat? Current chat will be saved to history.")) {
            try {
              startNewChat()
            } catch (e) {
              console.error("Error starting new chat:", e)
              vscode.postMessage({
                command: "error",
                error: "Failed to start new chat: " + e.message,
              })
            }
            // }
          })
        }

        const historyButton = document.getElementById("historyButton")
        const historyPopup = document.getElementById("historyPopup")
        const closeHistoryBtn = document.getElementById("closeHistory")

        if (historyButton && historyPopup) {
          historyButton.addEventListener("click", () => {
            if (historyPopup.style.display === "none") {
              // Request latest history
              vscode.postMessage({ type: "getHistory" })
              historyPopup.style.display = "block"
            } else {
              historyPopup.style.display = "none"
            }
          })

          // Close when clicking outside
          document.addEventListener("click", (e) => {
            if (
              historyPopup &&
              !historyPopup.contains(e.target) &&
              !historyButton.contains(e.target) &&
              historyPopup.style.display === "block"
            ) {
              historyPopup.style.display = "none"
            }
          })
        }

        if (closeHistoryBtn) {
          closeHistoryBtn.addEventListener("click", () => {
            historyPopup.style.display = "none"
          })
        }

        // Plan Button Logic
        const planButton = document.getElementById("planButton")
        const planStatusContainer = document.getElementById(
          "planStatusContainer",
        )
        const closePlanStatus = document.getElementById("closePlanStatus")

        if (planButton) {
          planButton.addEventListener("click", togglePlanPopup)
        }

        const closePlanPopupBtn = document.getElementById("closePlanPopup")
        if (closePlanPopupBtn) {
          closePlanPopupBtn.addEventListener("click", hidePlanPopup)
        }

        if (closePlanStatus && planStatusContainer) {
          closePlanStatus.addEventListener("click", () => {
            planStatusContainer.classList.add("hidden")
          })
        }

        messageInput.value = messageInput.value.trim()

        messageInput.addEventListener("keydown", handleKeyDown)

        // Attachment Logic
        const fileInput = document.getElementById("file-input")
        const attachButton = document.getElementById("attach-button")
        const contextButton = document.getElementById("context-button")
        const preview = document.getElementById("attachment-preview")
        const dropZone = document.getElementById("messageInputContainer")

        attachButton.addEventListener("click", () => fileInput.click())
        if (contextButton) {
          contextButton.addEventListener("click", () => openContextPicker())
        }
        fileInput.addEventListener("change", (e) =>
          handleFiles(e.target.files),
        )
        const contextPickerModal =
          document.getElementById("contextPickerModal")
        const contextPickerSearch = document.getElementById(
          "contextPickerSearch",
        )
        const contextPickerCancelBtn = document.getElementById(
          "contextPickerCancelBtn",
        )
        const contextPickerApplyBtn = document.getElementById(
          "contextPickerApplyBtn",
        )
        if (contextPickerSearch) {
          contextPickerSearch.addEventListener("input", (e) => {
            const q = e.target.value || ""
            if (contextSearchTimer) {
              clearTimeout(contextSearchTimer)
            }
            contextSearchTimer = setTimeout(() => {
              refreshContextSearch(q)
            }, 220)
          })
        }
        if (contextPickerCancelBtn) {
          contextPickerCancelBtn.addEventListener("click", () =>
            closeContextPicker(),
          )
        }
        if (contextPickerApplyBtn) {
          contextPickerApplyBtn.addEventListener("click", () => {
            renderSelectedContextChips()
            closeContextPicker()
          })
        }
        if (contextPickerModal) {
          contextPickerModal.addEventListener("click", (e) => {
            if (e.target === contextPickerModal) closeContextPicker()
          })
        }

        dropZone.addEventListener("dragover", (e) => {
          e.preventDefault()
          dropZone.classList.add("border-blue-500", "border-2")
        })
        dropZone.addEventListener("dragleave", (e) => {
          e.preventDefault()
          dropZone.classList.remove("border-blue-500", "border-2")
        })
        dropZone.addEventListener("drop", (e) => {
          e.preventDefault()
          dropZone.classList.remove("border-blue-500", "border-2")
          handleFiles(e.dataTransfer.files)
        })

        messageInput.addEventListener("paste", (e) => {
          const items = (e.clipboardData || e.originalEvent.clipboardData)
            .items
          const files = []
          for (let index in items) {
            const item = items[index]
            if (item.kind === "file") {
              files.push(item.getAsFile())
            }
          }
          if (files.length > 0) {
            e.preventDefault()
            handleFiles(files)
          }
        })

        window.addEventListener("message", async (event) => {
          const messageEvent = event.data

          if (messageEvent.command === "systemLog") {
            console.log("[SystemLog]", messageEvent.message)
            return
          }

          if (messageEvent.command == "updateFileInfo") {
            if (messageEvent.guardrails) {
              currentGuardrails = messageEvent.guardrails
            }
            renderActiveFileReference(
              messageEvent.filePath || "",
              messageEvent.selectedLine || "",
            )
            return
          }

          if (messageEvent.command === "filesFound") {
            // console.log(`Files found webview: ${messageEvent.files}`)
            workspaces = messageEvent.files
            var token = messageEvent.token
            await loginAPI(workspaces, token)
            return
            // Handle the list of files as needed
          } else if (messageEvent.command === "error") {
            console.error(`Error: ${messageEvent.error}`)
            return
          }

          if (messageEvent.command === "commandNeedsInput") {
            const promptText =
              messageEvent.prompt ||
              "Terminal command needs input. Type your response:"
            const userInput = window.prompt(
              `Interactive terminal prompt detected:\n\n${promptText}\n\nInput to send (example: Enter, y, n, 1):`,
              "",
            )
            if (userInput !== null) {
              vscode.postMessage({
                type: "commandInput",
                input: userInput,
              })
            }
            return
          }

          if (messageEvent.command === "filesModified") {
            const changes = messageEvent.changes
            if (messageArray.length > 0) {
              const lastMsg = messageArray[messageArray.length - 1]
              if (!lastMsg.changes) {
                lastMsg.changes = []
              }
              lastMsg.changes.push(...changes)
              saveState()
              // Re-render the last message to show the changes
              updateMessagesAssistant(lastMsg)
            }
            return
          }

          if (messageEvent.command === "workspaceCode") {
            // console.log(`Files found webview: ${messageEvent.files}`)
            workspaces = messageEvent.files
            await updateWorkspacesAPI(workspaces)
            if (window.resolveWorkspaceUpdate) {
              window.resolveWorkspaceUpdate()
              window.resolveWorkspaceUpdate = null
            }
            return
            // Handle the list of files as needed
          } else if (messageEvent.command === "error") {
            console.error(`Error: ${messageEvent.error}`)
            return
          }

          if (messageEvent.command === "workspaceCodeCancel") {
            await cancelUpdateWorkspaces()
            return
            // Handle the list of files as needed
          } else if (messageEvent.command === "error") {
            console.error(`Error: ${messageEvent.error}`)
            return
          }

          if (messageEvent.command === "workspaceDirty") {
            if (typeof messageEvent.workspaceVersion === "number") {
              workspaceVersion = messageEvent.workspaceVersion
            }
            isWorkspaceDirty = !!messageEvent.isDirty
            if (isWorkspaceDirty) {
              cachedContextVersion = -1
            }
            const btnWorkspace = document.getElementById("button-workspace")
            if (btnWorkspace) {
              btnWorkspace.style.display = isWorkspaceDirty
                ? "inline-flex"
                : "none"
            }
            return
          }

          if (messageEvent.command === "historyLoad") {
            window.chatHistory = messageEvent.history || []
            renderHistoryList()
            return
          }

          if (messageEvent.command === "aiSettings") {
            currentAiSettings = {
              ...currentAiSettings,
              ...messageEvent,
            }
            const modelSelect = document.getElementById("modelSelect")
            if (modelSelect) {
              const allowedModel = resolveAllowedModelOrFallback(
                currentAiSettings.selectedModel,
              )
              modelSelect.value = allowedModel
              currentAiSettings.selectedModel = allowedModel
              if (
                currentAiSettings.hasUserApiKey ||
                isFreeQuotaModel(allowedModel)
              ) {
                lastAllowedModel = allowedModel
              }
            }
            updateQuotaBadgeFromSettings()
            return
          }

          if (messageEvent.command === "aiSettingsSaved") {
            currentAiSettings = {
              ...currentAiSettings,
              ...messageEvent,
            }
            const modelSelect = document.getElementById("modelSelect")
            if (modelSelect) {
              const allowedModel = resolveAllowedModelOrFallback(
                currentAiSettings.selectedModel,
              )
              modelSelect.value = allowedModel
              currentAiSettings.selectedModel = allowedModel
              if (
                currentAiSettings.hasUserApiKey ||
                isFreeQuotaModel(allowedModel)
              ) {
                lastAllowedModel = allowedModel
              }
            }
            updateQuotaBadgeFromSettings()
            return
          }

          if (messageEvent.command === "tokenValid") {
            localStorage.setItem("token", messageEvent.token)
            localStorage.setItem("userId", messageEvent.userId)

            window.filePathCache.clear()
            window.fileContentMap.clear()
            cachedProjectContext = ""
            cachedContextVersion = -1
            selectedContextRefs = []
            attachments = []
            renderAttachments()
            console.log(
              "[webview] Cleared file caches and context for security - new chat context isolation"
            )

            // Fetch and display chat history ONLY if this is the first initialization
            // If isInitialized is true, it means we already have a session (either restored or New Chat started)
            if (!isInitialized) {
              isInitialized = true
              if (persistedState.messages && persistedState.messages.length > 0) {
                messageArray = persistedState.messages
                displayMessages(messageArray)

                document.getElementById("messageInput").value =
                  persistedState.input ?? ""
                const modeSelect = document.getElementById("modeSelect")
                if (modeSelect) {
                  modeSelect.value = persistedState.mode ?? "agent"
                }
                const modelSelect = document.getElementById("modelSelect")
                if (modelSelect && persistedState.model) {
                  const allowedModel = resolveAllowedModelOrFallback(
                    persistedState.model,
                  )
                  modelSelect.value = allowedModel
                  currentAiSettings.selectedModel = allowedModel
                  if (
                    currentAiSettings.hasUserApiKey ||
                    isFreeQuotaModel(allowedModel)
                  ) {
                    lastAllowedModel = allowedModel
                  }
                }
                const messageInputContainer = document.getElementById(
                  "messageInputContainer",
                )
                messageInputContainer.style.display = "block"
                var content = document.getElementById("content")
                content.scrollTop = content.scrollHeight
                const messageInput = document.getElementById("messageInput")
                messageInput.style.height = "auto"
                messageInput.style.height = messageInput.scrollHeight + "px"
                messageInput.focus()
              } else if (persistedState.messagesHTML) {
                document.getElementById("content").innerHTML =
                  persistedState.messagesHTML
                document.getElementById("messageInput").value =
                  persistedState.input ?? ""
                const modeSelect = document.getElementById("modeSelect")
                if (modeSelect) {
                  modeSelect.value = persistedState.mode ?? "agent"
                }
                const modelSelect = document.getElementById("modelSelect")
                if (modelSelect && persistedState.model) {
                  const allowedModel = resolveAllowedModelOrFallback(
                    persistedState.model,
                  )
                  modelSelect.value = allowedModel
                  currentAiSettings.selectedModel = allowedModel
                  if (
                    currentAiSettings.hasUserApiKey ||
                    isFreeQuotaModel(allowedModel)
                  ) {
                    lastAllowedModel = allowedModel
                  }
                }
                // Show the message input container
                const messageInputContainer = document.getElementById(
                  "messageInputContainer",
                )
                messageInputContainer.style.display = "block"

                // Re-attach event listeners for buttons since innerHTML destroys them
                reattachEventListeners()

                var content = document.getElementById("content")
                // Scroll to the bottom of the content
                content.scrollTop = content.scrollHeight
                const messageInput = document.getElementById("messageInput")
                // Trigger resize
                messageInput.style.height = "auto"
                messageInput.style.height = messageInput.scrollHeight + "px"
                messageInput.focus()
              } else {
                fetchHistory()
              }
            } else {
              console.log(
                "[webview] Skipping state restoration - session already initialized"
              )
            }
            return
            // Handle the list of files as needed
          } else if (messageEvent.command === "error") {
            console.error(`Error: ${messageEvent.error}`)
            return
          }

          if (messageEvent.command === "tokenInvalid") {
            logout()
            return
            // Handle the list of files as needed
          } else if (messageEvent.command === "error") {
            console.error(`Error: ${messageEvent.error}`)
            return
          }

          // Ignore other commands that fell through
          if (messageEvent.command) {
            return
          }

          // Legacy handling for messages without command - now handled in handleSendMessage via explicit listener
          return
        })
      })

      function handleFiles(files) {
        if (!files || files.length === 0) return
        const fileInput = document.getElementById("file-input")
        Array.from(files).forEach((file) => {
          const reader = new FileReader()
          reader.onload = (e) => {
            const content = e.target.result
            const attachment = {
              name: file.name,
              type: file.type,
              content: content,
            }
            attachments.push(attachment)
            renderAttachments()
          }
          reader.readAsDataURL(file)
        })
        if (fileInput) fileInput.value = ""
      }

      function renderAttachments() {
        const preview = document.getElementById("attachment-preview")
        if (!preview) return

        preview.innerHTML = ""
        if (attachments.length > 0) {
          preview.classList.remove("hidden")
        } else {
          preview.classList.add("hidden")
        }

        attachments.forEach((att, index) => {
          const div = document.createElement("div")
          div.className =
            "relative group bg-gray-800 rounded p-1 border border-gray-600 inline-block mr-2"

          if (att.type.startsWith("image/")) {
            const img = document.createElement("img")
            img.src = att.content
            img.className = "h-8 w-8 object-cover rounded"
            div.appendChild(img)
          } else {
            const span = document.createElement("div")
            span.className =
              "h-8 w-8 flex items-center justify-center text-xs text-center rounded overflow-hidden p-1 break-all text-white"
            span.textContent = att.name
            div.appendChild(span)
          }

          const removeBtn = document.createElement("button")
          removeBtn.className =
            "absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-5 h-5 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity text-xs"
          removeBtn.innerHTML = "&times;"
          removeBtn.onclick = () => {
            attachments.splice(index, 1)
            renderAttachments()
          }
          div.appendChild(removeBtn)
          preview.appendChild(div)
        })
      }

      function normalizeAttachments(files) {
        const arr = (files || []).map((att) => {
          const content = att?.content || ""
          const match = /^data:(.*?);base64,(.*)$/.exec(content)
          if (match) {
            const mime = match[1] || att.type || ""
            const base64 = match[2] || ""
            return {
              name: att.name,
              type: mime,
              contentBase64: base64,
              encoding: "base64",
              contentDataUrl: content,
            }
          }
          return {
            name: att.name,
            type: att.type || "",
            contentBase64: content,
            encoding: "base64",
            contentDataUrl: content,
          }
        })
        try {
          console.log(
            "normalizeAttachments",
            arr.map((a) => ({
              name: a.name,
              type: a.type,
              len: a.contentBase64?.length || 0,
            })),
          )
        } catch (e) { }
        return arr
      }

      function handleKeyDown(event) {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault()
          handleSendMessage()
        } else {
          this.style.height = "auto" // Reset tinggi agar bisa menghitung tinggi yang baru
          this.style.height = Math.min(this.scrollHeight, 300) + "px" // Set tinggi maksimal 300px
        }
      }

      async function handleSendMessage() {
        if (isLoading) {
          stopGeneration()
          return
        }

        const messageInput = document.getElementById("messageInput")
        const messageVal = messageInput.value.trim()
        if (!messageVal) return

        lastSentMessage = messageVal

        document.getElementById("generating").innerHTML = "Generating..."
        const sendMessageButton = document.getElementById("button-send")
        const stopButton = document.getElementById("button-stop")
        const newChatButton = document.getElementById("newChatButton")
        const historyButton = document.getElementById("historyButton")

        sendMessageButton.classList.add("hidden")
        stopButton.classList.remove("hidden")

        if (newChatButton) newChatButton.disabled = true
        if (historyButton) historyButton.disabled = true

        console.log("send message to Vibe Coding")

        // Wait for response from extension
        const response = await new Promise((resolve) => {
          const handler = (event) => {
            const msg = event.data
            if (msg.command === "selectedTextResponse") {
              window.removeEventListener("message", handler)
              resolve(msg)
            }
          }
          window.addEventListener("message", handler)
          vscode.postMessage({ command: "getSelectedText" })

          // Fallback timeout
          setTimeout(() => {
            window.removeEventListener("message", handler)
            resolve({ text: "", allCode: "" })
          }, 2000)
        })

        const coding = response.text || ""
        const allCode = response.allCode || ""
        lastSelectedEditorText = coding || ""
        renderActiveFileReference("", "")

        const allCodeStorageKey = "allCodeStorage"
        const codingStorageKey = "codingStorage"
        const storedAllCode = localStorage.getItem(allCodeStorageKey)
        const storedCoding = localStorage.getItem(codingStorageKey)

        if (allCode && storedAllCode !== allCode) {
          localStorage.setItem(allCodeStorageKey, allCode)
          console.log("All code saved to local storage.")
        }
        if (coding && storedCoding !== coding) {
          localStorage.setItem(codingStorageKey, coding)
          console.log("Coding saved to local storage.")
        }

        let message = messageVal
        const modeSelect = document.getElementById("modeSelect")
        const mode = modeSelect ? modeSelect.value : "agent"
        const modelSelect = document.getElementById("modelSelect")
        const selectedModel = ensureSupportedModel(
          (modelSelect && modelSelect.value) ||
          currentAiSettings.selectedModel ||
          "gpt-5.1-codex-mini",
        )
        if (
          (mode === "agent" || mode === "chat") &&
          !isFreeQuotaModel(selectedModel) &&
          !currentAiSettings.hasUserApiKey
        ) {
          const warnId = `assistant-${Date.now() + Math.random()}`
          displayMessagesAssistant({
            role: "assistant",
            content: `⚠️ Model ${selectedModel} requires your own API key (BYOK).`,
            uniqueId: warnId,
          })
          messageArray.push({
            role: "assistant",
            content: `⚠️ Model ${selectedModel} requires your own API key (BYOK).`,
          })
          saveState()
          isLoading = false
          pendingPromptAccess = null
          resetSendUiAfterEarlyExit()
          openApiKeyModal()
          return
        }

        if (coding && mode !== "agent") {
          message =
            "[labelInstruction]Instruction: [labelInstruction]" +
            message +
            "[selection]" +
            coding +
            "[selection]"
        }
        if (allCode && mode !== "agent") {
          message = "[fullcode]" + allCode + "[fullcode]" + message
        }
        const manualContextBlock = await buildSelectedContextPromptBlock()
        if (manualContextBlock) {
          message += manualContextBlock
        }

        console.log("send message to API")
        if (!message) return
        sendMessageToApi(message)
      }

      function stopGeneration() {
        if (abortController) {
          abortController.abort()
          abortController = null
        }
        if (agentAbortController) {
          try {
            agentAbortController.abort()
          } catch (e) { }
          agentAbortController = null
        }

        // Notify extension to abort any running tasks
        vscode.postMessage({ command: "abort" })

        // Dispatch event for internal listeners
        window.dispatchEvent(new Event("agent-stop"))

        isLoading = false
        pendingPromptAccess = null

        const sendMessageButton = document.getElementById("button-send")
        const stopButton = document.getElementById("button-stop")
        const loader = document.getElementById("loader")
        const messageInput = document.getElementById("messageInput")
        const newChatButton = document.getElementById("newChatButton")
        const historyButton = document.getElementById("historyButton")

        sendMessageButton.classList.remove("hidden")
        stopButton.classList.add("hidden")
        loader.classList.add("hidden")

        if (newChatButton) newChatButton.disabled = false
        if (historyButton) historyButton.disabled = false

        messageInput.value = lastSentMessage
        messageInput.style.height = "auto"
        messageInput.style.height = messageInput.scrollHeight + "px"
        messageInput.disabled = false
        messageInput.focus()

        document.getElementById("generating").innerHTML = "Stopped."
        setTimeout(() => {
          if (!isLoading) document.getElementById("generating").innerHTML = ""
        }, 2000)
      }

      async function sendMessageToApi(message, isRetry = false) {
        if (isLoading && !isRetry) return // Allow retry to proceed if called internally
        isLoading = true

        // Setup AbortController
        abortController = new AbortController()

        const messageInput = document.getElementById("messageInput")

        // Clear input immediately
        if (!isRetry) {
          messageInput.value = ""
          messageInput.style.height = "auto"
        }

        messageInput.disabled = true
        document.getElementById("generating").innerHTML = "Generating..."

        const uniqueId = Date.now() + Math.random()

        // Clone attachments for this message
        if (isRetry && pendingAttachments) {
          attachments = pendingAttachments
        }
        const currentAttachments = [...attachments]
        const normalizedAttachments = normalizeAttachments(currentAttachments)
        try {
          console.log(
            "sending attachments",
            normalizedAttachments.map((a) => ({
              name: a.name,
              type: a.type,
              len: a.contentBase64?.length || 0,
            })),
          )
        } catch (e) { }

        let displayMessage = message
        if (currentAttachments.length > 0) {
          const tokens = currentAttachments.map((a) => {
            const isImg = (a.type || "").startsWith("image/")
            const src = a.contentDataUrl || a.content || ""
            if (isImg && src) {
              return `[att-img name="${a.name.replace(/"/g, "")}" src="${src.replace(/"/g, "%22")}"]`
            }
            return `[att-file name="${a.name.replace(/"/g, "")}"]`
          })
          displayMessage += "\n\n" + tokens.join(" ")
        }

        if (!isRetry) {
          // add the “user” bubble
          displayMessagesAssistant({
            role: "user",
            content: displayMessage,
            uniqueId,
          })
          //save message
          messageArray.push({ role: "user", content: displayMessage })
          saveState()
        }

        // add an empty “assistant” bubble that we’ll update
        displayMessagesAssistant({
          role: "assistant",
          content: "",
          uniqueId: `assistant-${uniqueId}`,
        })

        const modeSelect = document.getElementById("modeSelect")
        const mode = modeSelect ? modeSelect.value : "agent"
        const modelSelect = document.getElementById("modelSelect")
        const selectedModel = ensureSupportedModel(
          (modelSelect && modelSelect.value) ||
          currentAiSettings.selectedModel ||
          "gpt-5.1-codex-mini",
        )

        // Workspace dirty auto-sync is disabled; do not block send flow.
        if (mode === "agent" && isWorkspaceDirty && !isRetry) {
          isWorkspaceDirty = false
        }

        if (!isRetry || !pendingPromptAccess) {
          pendingPromptAccess = await requestPromptQuota(mode, selectedModel)
        }
        if (!pendingPromptAccess || !pendingPromptAccess.allowed) {
          const reason =
            pendingPromptAccess?.reason ||
            "Prompt quota check failed. Please try again."
          updateMessagesAssistant({
            uniqueId: `assistant-${uniqueId}`,
            content: `⚠️ ${reason}`,
          })
          isLoading = false
          pendingPromptAccess = null
          resetSendUiAfterEarlyExit()
          return
        }
        currentAiSettings.selectedModel = ensureSupportedModel(
          pendingPromptAccess.selectedModel || selectedModel,
        )
        if (
          currentAiSettings.hasUserApiKey ||
          isFreeQuotaModel(currentAiSettings.selectedModel)
        ) {
          lastAllowedModel = currentAiSettings.selectedModel
        }
        currentAiSettings.hasUserApiKey = !!pendingPromptAccess.hasUserApiKey
        currentAiSettings.freePromptLimit =
          pendingPromptAccess.freePromptLimit ??
          currentAiSettings.freePromptLimit
        currentAiSettings.machinePromptUsed =
          pendingPromptAccess.machinePromptUsed ??
          currentAiSettings.machinePromptUsed
        currentAiSettings.machinePromptRemaining =
          pendingPromptAccess.machinePromptRemaining ??
          currentAiSettings.machinePromptRemaining
        updateQuotaBadgeFromSettings()
        const resolvedUserApiKey = pendingPromptAccess.userApiKey || ""

        if (mode === "agent") {
          // Clear attachments immediately after sending (but keep snapshot for this request)
          const snapshot = normalizedAttachments
          attachments = []
          renderAttachments()
          // Setup AbortController for agent workflow
          agentAbortController = new AbortController()
          try {
            await handleAgentWorkflow(message, uniqueId, snapshot, false, {
              model: currentAiSettings.selectedModel || selectedModel,
              userApiKey: resolvedUserApiKey,
            })
          } catch (err) {
            if (err.name !== "AbortError") {
              console.error("Agent workflow error:", err)
            }
          }
          pendingPromptAccess = null
          return
        }

        const data = {
          userId: localStorage.getItem("userId"),
          token: localStorage.getItem("token"),
          message,
          mode: mode,
          model: currentAiSettings.selectedModel || selectedModel,
          userApiKey: resolvedUserApiKey,
          attachments: normalizedAttachments,
          guardrails: currentGuardrails,
          sessionId: currentSessionId,
        }

        // Clear attachments
        attachments = []
        renderAttachments()

        try {
          const response = await fetch("http://localhost:13100/api/message", {
            method: "POST",
            headers: {
              Authorization: `Bearer ${data.token}`,
              "Content-Type": "application/json",
            },
            body: JSON.stringify(data),
            signal: abortController.signal,
          })

          if (!response.ok) {
            const clone = response.clone()
            try {
              const errJson = await clone.json()
              if (errJson.error === "WORKSPACE_MISSING") {
                console.log("Workspace missing, triggering auto-scan...")

                // Remove the empty assistant bubble we just added
                const bubble = document.getElementById(`assistant-${uniqueId}`)
                if (bubble) bubble.parentElement.remove()

                pendingMessage = message // Save for retry
                pendingAttachments = currentAttachments
                await updateWorkspaces(true) // Call with silent=true
                return
              }
            } catch (e) {
              console.error(e)
            }

            throw new Error("Failed to send message")
          }

          const reader = response.body.getReader()
          const decoder = new TextDecoder()
          let assistantMessage = ""

          var no = 0
          // read the stream
          while (true) {
            messageInput.value = ""
            const { value, done } = await reader.read()
            if (done) break
            const chunk = decoder.decode(value, { stream: true })
            assistantMessage += chunk

            // update the existing assistant bubble
            updateMessagesAssistant({
              uniqueId: `assistant-${uniqueId}`,
              content: assistantMessage,
            })
            if (no == 0) {
              const content = document.getElementById("content")
              content.scrollTop = content.scrollHeight
            }
            no++
          }

          console.log("stream finished")
          console.log(assistantMessage)

          // Enhanced writeFile validation (supports [writeFileVico] alias)
          const normalizedAssistantMessage = assistantMessage.replace(
            /\[(\/?)writeFileVico\s*\]/gi,
            "[$1writeFile]",
          )
          const hasWriteFile = /\[(?:writeFile|writeFileVico)\]/i.test(
            assistantMessage,
          )
          const hasClosingWriteFile = /\[\/(?:writeFile|writeFileVico)\]/i.test(
            assistantMessage,
          )
          const hasFileBlock = assistantMessage.includes("[file ")
          const hasDiffBlock = assistantMessage.includes("[diff ")

          console.log(`[writeFile] Validation: hasWriteFile=${hasWriteFile}, hasClosing=${hasClosingWriteFile}, hasFile=${hasFileBlock}, hasDiff=${hasDiffBlock}`)

          // if a write-file command appears, send it immediately
          if (hasWriteFile) {
            if (!hasClosingWriteFile) {
              console.warn("[writeFile] Warning: Missing closing [/writeFile] tag")
            }
            if (!hasFileBlock && !hasDiffBlock) {
              console.warn("[writeFile] Warning: No [file] or [diff] blocks found inside [writeFile]")
            }
            vscode.postMessage({
              type: "writeFile",
              assistantMessage: normalizedAssistantMessage,
            })
          }

          // finalize: save and tidy up UI
          messageArray.push({ role: "assistant", content: assistantMessage })

          const loader = document.getElementById("loader")
          const sendBtn = document.getElementById("button-send")
          const stopBtn = document.getElementById("button-stop")
          const newChatButton = document.getElementById("newChatButton")
          const historyButton = document.getElementById("historyButton")

          loader.classList.add("hidden")
          stopBtn.classList.add("hidden")
          sendBtn.classList.remove("hidden")

          if (newChatButton) newChatButton.disabled = false
          if (historyButton) historyButton.disabled = false

          document.getElementById("generating").innerHTML = ""
          saveState()
          setTimeout(() => {
            isLoading = false
            messageInput.disabled = false // Enable message input after loading is complete
            messageInput.focus()
          }, 1000)
          pendingPromptAccess = null
        } catch (err) {
          if (err.name === "AbortError") {
            console.log("Fetch aborted by user")
            pendingPromptAccess = null
            return // Stop execution here, stopGeneration handled UI
          }
          console.error("Stream error:", err)
          isLoading = false
          pendingPromptAccess = null
          // Restore UI on error
          document.getElementById("loader").classList.add("hidden")
          document.getElementById("button-stop").classList.add("hidden")
          document.getElementById("button-send").classList.remove("hidden")
          document.getElementById("messageInput").disabled = false

          const newChatButton = document.getElementById("newChatButton")
          const historyButton = document.getElementById("historyButton")
          if (newChatButton) newChatButton.disabled = false
          if (historyButton) historyButton.disabled = false
        }
      }

      async function handleAgentWorkflow(
        message,
        uniqueId,
        attachments,
        isRetry = false,
        aiConfig = {},
      ) {
        const resolveVerificationModeFromRequest = (text) => {
          const src = String(text || "")
          const explicit =
            /\bverification_mode\s*[:=]\s*(minimal|normal|strict)\b/i.exec(src)
          if (explicit && explicit[1]) {
            return explicit[1].toLowerCase()
          }
          if (
            /\b(simple|sederhana)\b/i.test(src) ||

          currentContext += `\n=== PLANNING & EXECUTION STRATEGY ===\n1. **PHASE 1: PLAN**: At the very beginning, CREATE A COMPREHENSIVE, NUMBERED PLAN. List all steps required to solve the user's request.\n2. **PHASE 2: EXECUTE**: Execute the plan step-by-step. Do not deviate unless a step fails.\n3. **VERIFY**: After applying a fix, verify only with short-lived commands (build/test/lint). NEVER run server/dev commands.\n4. **NO LOOPING**: If a step fails, do not retry the exact same action. Analyze the error and adjust your plan.\n5. **HISTORY AWARENESS**: Review the 'History' to see what steps have already been completed. DO NOT REPEAT COMPLETED STEPS.\n============================\n`
          currentContext += `\n=== MEMORY POLICY ===\n- In empty workspace, NEVER create .vico/memory.md as first action.\n- First action must scaffold/init framework.\n- Update memory only after real code implementation exists.\n- If .vico/* is not writable by whitelist/guardrails, skip memory append silently and continue core task.\n- Never trigger REPLAN only to request permission for optional memory updates.\n============================\n`
          currentContext += `\n=== HISTORY & LESSONS POLICY ===\n- Never edit .vico/history.md or .vico/lessons.md while planning, thinking, or reading; treat those files as read-only references until functional code is written.\n- Only append or modify history/lessons after all coding steps are complete and verified, and only as a final summary action requested by the user.\n- If the user did not explicitly ask for documentation/recap updates, keep history.md and lessons.md untouched.\n============================\n`

          currentContext += `\n=== FILE STRUCTURE AWARENESS ===\nBefore creating any new file or component, you MUST check the 'PROJECT FILE STRUCTURE' provided in the context. \n- If this is a Next.js project, verify if it uses the 'app/' directory (App Router) or 'pages/' directory (Pages Router). \n- Do NOT create 'pages/index.js' if 'app/page.tsx' exists. \n- Do NOT mix TypeScript (.ts/.tsx) and JavaScript (.js/.jsx) unless the project already does. Follow existing patterns.\n================================\n`
          currentContext += `\n=== DEFAULT WEB POLICY ===\nIf user asks for a web app and does not specify framework, default to Next.js + Tailwind CSS using NON-INTERACTIVE scaffold command.\n- Preferred scaffold command: npx create-next-app . --yes --ts --eslint --tailwind --app --use-npm\n- Never run npm install/build/test before dependency file exists.\n================================\n`
          currentContext += `\n=== WEB FRAMEWORK OVERRIDE ===\nIf user explicitly asks for HTML/CSS/JavaScript without framework (for example: 'tanpa framework', 'no framework', 'vanilla'), DO NOT scaffold Next.js/Vite/React.\nImplement directly with plain files (for example: index.html + script.js), and use Tailwind via CDN unless user requests another setup.\n================================\n`
          currentContext += `\n=== DEPENDENCY & IMPORT POLICY ===\nBefore writing any external import (for example: import Hls from 'hls.js'), verify dependency source first.\n- For explicit vanilla/no-framework requests: NEVER use bare npm imports. Use CDN/browser script import and global object fallback.\n- If project has dependency manifest and framework-based build is used: install missing package first, then import.\n- Never reference non-existent local files in import path.\n================================\n`
          currentContext += `\n=== CONTENT FIDELITY POLICY ===\n- Use literal values from user prompt exactly. Never replace provided URL with placeholders.\n- Forbidden placeholder patterns: example.com, your-*.m3u8, final-*.m3u8, TODO placeholder URLs.\n- Do not add extra branding words like 'Final' unless user explicitly asked for it.\n================================\n`
          currentContext += `\n=== PRODUCTION COPY POLICY ===\nDo not leak prompt meta constraints into user-facing copy/code.\n- Forbidden in generated UI text/comments: 'no framework', 'tanpa framework', 'without framework', 'vanilla'.\n- These are implementation constraints, not product copy.\n================================\n`

          }

              // 2. Read package.json if exists

              // 3. Read tsconfig.json if exists

            // Restore "Thinking" status

          } catch (scanError) {

            // Continue without scan if it fails
          }

          currentContext += `\n=== ANTI-PATTERNS (STRICTLY FORBIDDEN) ===\n1. **NO EMPTY SCAFFOLDING**: Do NOT create empty folders or '.gitkeep' files. If you need a folder, create it by writing a REAL file inside it (e.g., 'components/Navbar.tsx', not just 'components/').\n2. **NO PLACEHOLDERS**: Do NOT write files with "// TODO: implement". Write the ACTUAL code requested.\n3. **NO HALLUCINATED COMPLETION**: Do not say "Task Completed" if you have only created folders. You must write the functional code.\n==========================================\n`
          cachedProjectContext = currentContext

        // Initialize global plan state if starting new workflow

              workflowMeta.scaffoldDone = true
            }
          } catch (e) { }
          if (workflowMeta.forceFullRewriteFiles.size > 0) {

            const hint = `FORCE_FULL_REWRITE:${forcedList.join("|")}`

          }

          // ... (existing bubble creation code) ...

          if (iteration > 1) {

          }

          try {

            const response = await fetch(

              {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                },
                body: JSON.stringify({
                  userId,
                  token,
                  model: selectedModel,
                  userApiKey,
                  verification_mode: verificationMode,
                  message,
                  attachments,

                }),
                signal: agentAbortController?.signal,
              },
            )

            if (!response.ok) {
              throw new Error(`Plan request failed (${response.status})`)
            }
            const reader = response.body.getReader()
            const decoder = new TextDecoder()
            let planJson = ""

            while (true) {
              const { value, done } = await reader.read()
              if (done) break
              const chunk = decoder.decode(value, { stream: true })
              planJson += chunk
            }

            let planData
            try {
              // Find JSON in the response (robust extraction)
              let jsonString = planJson

              // 1. Try to extract from markdown code block first
              const markdownMatch = planJson.match(
                /```(?:json)?\s*([\s\S]*?)```/,
              )
              if (markdownMatch) {
                jsonString = markdownMatch[1]
              }

              // 2. Find the first '{' and last '}' to isolate the JSON object
              const firstBrace = jsonString.indexOf("{")
              const lastBrace = jsonString.lastIndexOf("}")

              if (
                firstBrace !== -1 &&
                lastBrace !== -1 &&
                lastBrace > firstBrace
              ) {
                const potentialJson = jsonString.substring(
                  firstBrace,
                  lastBrace + 1,
                )
                planData = JSON.parse(potentialJson)
              } else {
                throw new Error("No valid JSON object found in response")
              }

              updateMessagesAssistant({

                content: `⚠️ **Planner output tidak valid, mencoba ulang otomatis (iterasi ${iteration}/${MAX_ITERATIONS}).**`,

            if (!planData.plan || planData.plan.length === 0) {

              saveState()
              resetUI()

            }

            let planSteps = Array.isArray(planData.plan) ? planData.plan : []
            const manualVerifyBeforeCount = planSteps.length
            planSteps = planSteps.filter((s) => !isManualVerificationStep(s))
            if (planSteps.length !== manualVerifyBeforeCount) {
              currentContext +=
                "\n[System Feedback] Manual verification step removed (open browser/url/file is not possible in sandbox). Use executable checks only, or complete based on persisted file changes.\n"

            }
            if (isSimpleVanillaTask) {
              const beforeCount = planSteps.length
              planSteps = planSteps.filter((s) => {
                if (

                ) {

                }

              })

              if (planSteps.length === 0 && currentModifiedFiles.size > 0) {

            const isProjectInitialized =

            if (!isProjectInitialized && !isScaffoldStep(planSteps[0])) {
              if (userRequestedVanillaNoFramework) {
                currentContext +=
                  "\n[System Feedback] Empty workspace + explicit no-framework web request detected. Skip framework scaffold and implement with plain files.\n"
              } else if (isWebRequest(message)) {
                if (requestExplicitFramework(message)) {
                  planSteps = [
                    {

                      command:
                        "npx create-next-app . --yes --ts --eslint --tailwind --app --use-npm",
                    },
                  ]
                  planData.plan = planSteps
                  currentContext +=
                    "\n[System Feedback] Empty workspace + explicit framework request detected. Plan normalized to scaffold-first.\n"
                  updateMessagesAssistant({
                    uniqueId: `assistant-${currentUniqueId}`,
                    content:
                      "?? Empty project + explicit framework request. Enforcing scaffold-first.",
                  })
                } else {
                  currentContext +=
                    "\n[System Feedback] Empty workspace web request without explicit framework. Do not force Next.js scaffold; implement directly unless planner decides otherwise.\n"
                }
              } else if (requestNeedsScaffold(message)) {
                currentContext +=
                  "\n[System Feedback] Empty workspace detected. First step must scaffold/init framework before any code/file write.\n"
                updateMessagesAssistant({
                  uniqueId: `assistant-${currentUniqueId}`,
                  content:
                    "?? Plan rejected: empty workspace requires scaffold/init as first action. Replanning...",
                })
                continue
              } else {
                currentContext +=
                  "\n[System Feedback] Empty workspace detected with no explicit framework requirement. Direct file implementation is allowed.\n"
              }
            }
            if (isProjectInitialized && isScaffoldStep(planSteps[0])) {
              currentContext +=
                "\n[System Feedback] Project is already scaffolded (dependency file exists). Do NOT run scaffold again. Continue with feature implementation only.\n"
              updateMessagesAssistant({
                uniqueId: `assistant-${currentUniqueId}`,
                content:
                  "⚠️ Plan rejected: project already scaffolded. Skipping scaffold and forcing replan for implementation steps.",
              })
              continue
            }

            const step = planSteps[0]
            if (step.type === "complete") {
              updateMessagesAssistant({
                uniqueId: `assistant-${currentUniqueId}`,
                content: `✅ **Task Completed:** ${step.description}`,
              })
              messageArray.push({
                role: "assistant",
                content: `✅ Task Completed: ${step.description}`,
              })
              saveState()
              resetUI()
              return
            }

            // Render Plan
            let currentStepMarkdown = ""
            const planSignature = planSteps
              .map((s) => `${s.type || "unknown"}::${s.description || ""}`)
              .join("||")
            if (planSignature === lastPlanSignature) {
              repeatedPlanCount++
            } else {
              repeatedPlanCount = 0
              lastPlanSignature = planSignature
            }
            if (isSimpleVanillaTask && repeatedPlanCount >= 1) {
              currentContext +=
                "\n[System Feedback] Simple vanilla task detected and planner started repeating. Next plan must be very short (max 2 steps): 1) write/fix direct files with literal user URL and title, 2) complete. Do not re-edit same file multiple times without new error evidence.\n"
            }
            if (repeatedPlanCount >= 2) {
              currentContext +=
                "\n[System Feedback] Planner mengulang rencana yang sama. Buat langkah baru yang berbeda atau kirim step type='complete' jika tugas benar-benar sudah selesai.\n"
            }
            if (repeatedPlanCount >= 3) {
              const hotFiles = Array.from(
                (workflowMeta.fileTouchCounts || new Map()).entries(),
              )
                .sort((a, b) => b[1] - a[1])
                .slice(0, 3)
                .map((x) => x[0])
              currentContext +=
                `\n[System Feedback] LOOP_GUARD triggered: identical/repeated plan detected >= 4x.\n` +
                `[System Feedback] Next plan MUST be materially different and short (max 3 steps):\n` +
                `[System Feedback] 1) Apply one concrete code fix for root cause.\n` +
                `[System Feedback] 2) Run ONE short-lived verification command.\n` +
                `[System Feedback] 3) Return type='complete'.\n` +
                `[System Feedback] Do NOT repeat previous steps/descriptions verbatim.\n` +
                (hotFiles.length > 0
                  ? `[System Feedback] Focus files with repeated churn: ${hotFiles.join(", ")}.\n`
                  : "")
              updateMessagesAssistant({
                uniqueId: `assistant-${currentUniqueId}`,
                content:
                  "⚠️ Loop guard aktif: planner mengulang langkah yang sama. Memaksa rencana recovery yang berbeda.",
              })
              continue
            }

            // If the FIRST step is complete, we are done.
            if (planSteps[0].type === "complete") {
              updateMessagesAssistant({
                uniqueId: `assistant-${currentUniqueId}`,
                content: `✅ **Task Completed:** ${planSteps[0].description}`,
              })
              messageArray.push({
                role: "assistant",
                content: `✅ Task Completed: ${planSteps[0].description}`,
              })
              saveState()
              resetUI()
              return
            }

            // Build markdown for ALL steps
            window.currentPlanMarkdown = "" // Clear before building
            planSteps.forEach((s, i) => {
              const stepNum = i + 1
              let cleanDesc = s.description.replace(/^Step\s+\d+[:.]\s*/i, "")
              currentStepMarkdown += `[thinking title="Step ${stepNum}: ${cleanDesc}"]\n- [ ] ${cleanDesc}\n[/thinking]\n\n`

              // Append to global plan for popup
              window.currentPlanMarkdown += `- [ ] Step ${stepNum}: ${s.description}\n`
            })

            updatePlanPopup(window.currentPlanMarkdown)
            updatePlanButtonTitle(window.currentPlanMarkdown)

            updateMessagesAssistant({
              uniqueId: `assistant-${currentUniqueId}`,
              content: currentStepMarkdown,
            })

            // Execute Plan (pass ALL steps)
            const result = await executePlan(
              planSteps,
              currentUniqueId,
              userId,
              token,
              currentStepMarkdown,
              attachments,
              message,
              currentContext, // Pass accumulated context
              iteration,
              workflowMeta,
              {
                model: selectedModel,
                userApiKey,
                verificationMode,
              },
            )

            // Update context with the result from executePlan
            currentContext = result.context

            if (result.modifiedFiles) {
              result.modifiedFiles.forEach((f) => currentModifiedFiles.add(f))
              if (workflowMeta && workflowMeta.fileTouchCounts) {
                result.modifiedFiles.forEach((f) => {
                  const prev = workflowMeta.fileTouchCounts.get(f) || 0
                  workflowMeta.fileTouchCounts.set(f, prev + 1)
                  if (prev + 1 >= 3 && workflowMeta.forceFullRewriteFiles) {
                    workflowMeta.forceFullRewriteFiles.add(f)
                  }
                })
              }
            }

            // CRITICAL: Update history so the agent knows what it just did!
            // This prevents looping and "Step 1" hallucinations.
            const executedDescriptions = planSteps
              .map((s) => s.description)
              .join("\n- ")
            messageArray.push({
              role: "assistant",
              content: `[Plan Execution Completed]
Executed Steps:
- ${executedDescriptions}

Execution Result:
${result.summary || "Executed successfully."}`,
            })
            const isSimpleAssetTask = /\b(logo|favicon|icon|branding)\b/i.test(
              String(message || ""),
            )
            const verificationOnlyPlan =
              planSteps.length > 0 &&
              planSteps.every((s) => isVerificationOnlyStep(s))
            const noFileChangesThisIteration =
              !result.modifiedFiles || result.modifiedFiles.size === 0
            if (
              verificationOnlyPlan &&
              noFileChangesThisIteration &&
              !result.autoFixTriggered &&
              !result.hadStepError
            ) {
              consecutiveVerificationOnlyIterations++
            } else {
              consecutiveVerificationOnlyIterations = 0
            }
            if (
              consecutiveVerificationOnlyIterations >=
              (isSimpleVanillaTask || isSimpleAssetTask ? 1 : 2)
            ) {
              updateMessagesAssistant({
                uniqueId: `assistant-${currentUniqueId}`,
                content: `${result.summary || ""}\n\n✅ **Task Completed:** Verification-only loop stopped. No further code changes required.`,
              })
              messageArray.push({
                role: "assistant",
                content:
                  "✅ Task Completed: Verification-only loop stopped; implementation already sufficient.",
              })
              saveState()
              resetUI()
              return
            }
            const hasPersistedImplementation = !!(
              result.modifiedFiles && result.modifiedFiles.size > 0
            )
            const criticalFailurePattern =
              /(failed to compile|type error|cannot find name|ejsonparse|invalid package\.json|blocked because workspace is not scaffolded|invalid transient write path|step \d+ error)/i
            const hasCriticalFailure = criticalFailurePattern.test(
              String(result.summary || ""),
            )
            if (hasPersistedImplementation && !hasCriticalFailure) {
              updateMessagesAssistant({
                uniqueId: `assistant-${currentUniqueId}`,
                content: `${result.summary || ""}\n\n✅ **Task Completed:** Implementation persisted. Skipping extra strict verification.`,
              })
              messageArray.push({
                role: "assistant",
                content:
                  "✅ Task Completed: Implementation persisted. Extra verification skipped.",
              })
              saveState()
              resetUI()
              return
            }
            if (result.autoFixTriggered) {
              consecutiveFailedIterations++
              if (
                isSimpleVanillaTask &&
                currentModifiedFiles.size > 0 &&
                consecutiveFailedIterations >= 2
              ) {
                updateMessagesAssistant({
                  uniqueId: `assistant-${currentUniqueId}`,
                  content: `${result.summary || ""}\n\n**Task Completed:** Implementasi sudah tersimpan. Recovery loop dihentikan untuk simple vanilla task.`,
                })
                messageArray.push({
                  role: "assistant",
                  content:
                    "Task Completed: Implementasi tersimpan, loop recovery dihentikan untuk simple vanilla task.",
                })
                saveState()
                resetUI()
                return
              }
              currentContext +=
                "\n[Execution Feedback] Auto-fix/recovery triggered from failed command. Continue with replanning until the root cause is fixed.\n"
              updateMessagesAssistant({
                uniqueId: `assistant-${currentUniqueId}`,
                content: `${result.summary || ""}\n\n⚠️ **Command failed. Agent will continue with automatic recovery and replanning.**`,
              })
              continue
            }
            if (result.hadStepError) {
              consecutiveFailedIterations++
              if (
                isSimpleVanillaTask &&
                currentModifiedFiles.size > 0 &&
                consecutiveFailedIterations >= 2
              ) {
                updateMessagesAssistant({
                  uniqueId: `assistant-${currentUniqueId}`,
                  content: `${result.summary || ""}\n\n**Task Completed:** Perubahan utama sudah persisten. Replanning dihentikan agar tidak looping.`,
                })
                messageArray.push({
                  role: "assistant",
                  content:
                    "Task Completed: Perubahan utama persisten, replanning loop dihentikan.",
                })
                saveState()
                resetUI()
                return
              }
              currentContext +=
                "\n[Execution Feedback] Plan sebelumnya gagal di salah satu step. Buat plan lanjutan untuk memperbaiki error lalu lanjutkan task original.\n"
              updateMessagesAssistant({
                uniqueId: `assistant-${currentUniqueId}`,
                content: `${result.summary || ""}\n\n⚠️ **Ada step yang gagal. Agent lanjutkan otomatis dengan replanning.**`,
              })
              continue
            }
            consecutiveFailedIterations = 0
            if (
              result.modifiedFiles &&
              result.modifiedFiles.size === 0 &&
              planSteps.every((s) => s.type === "chat")
            ) {
              currentContext +=
                "\n[Execution Feedback] Plan sebelumnya tidak menghasilkan aksi coding. Plan berikut harus berisi aksi nyata (writeFile/diff/command) untuk menyelesaikan task.\n"
            }
            if (
              isSimpleVanillaTask &&
              result.modifiedFiles &&
              result.modifiedFiles.size > 0
            ) {
              updateMessagesAssistant({
                uniqueId: `assistant-${currentUniqueId}`,
                content: `${result.summary || ""}\n\n**Task Completed:** Simple vanilla coding selesai tanpa verifikasi terminal tambahan.`,
              })
              messageArray.push({
                role: "assistant",
                content:
                  "Task Completed: Simple vanilla coding selesai tanpa verifikasi terminal tambahan.",
              })
              saveState()
              resetUI()
              return
            }
            updateMessagesAssistant({
              uniqueId: `assistant-${currentUniqueId}`,
              content: `${result.summary || ""}\n\n✅ **Plan iterasi ${iteration} selesai. Melanjutkan validasi completion...**`,
            })
            continue
          } catch (err) {
            if (err.name === "AbortError") {
              updateMessagesAssistant({
                uniqueId: `assistant-${currentUniqueId}`,
                content: "Stopped.",
              })
              resetUI()
              return
            }
            console.error(err)
            currentContext += `\n[Workflow Error Iteration ${iteration}] ${err.message}\n`
            updateMessagesAssistant({
              uniqueId: `assistant-${currentUniqueId}`,
              content: `⚠️ Iterasi ${iteration} gagal: ${err.message}\nMencoba lanjut otomatis...`,
            })
            continue
          }
        }

        // Max iterations reached
        if (iteration >= MAX_ITERATIONS) {
          updateMessagesAssistant({
            uniqueId: `assistant-${currentUniqueId}`,
            content: `**Stopped: Max iterations (${MAX_ITERATIONS}) reached.**`,
          })
          messageArray.push({
            role: "assistant",
            content: "**Stopped: Max iterations reached.**",
          })
          saveState()
          resetUI()
        }
      }

      async function executePlan(
        plan,
        uniqueId,
        userId,
        token,
        initialMarkdown,
        attachments,
        originalRequest,
        existingContext = "", // Add existingContext parameter
        iteration = 1,
        workflowMeta = null,
        aiConfig = {},
      ) {
        let context = existingContext // Initialize with existing context
        const selectedModel = ensureSupportedModel(
          aiConfig.model ||
          currentAiSettings.selectedModel ||
          "gpt-5.1-codex-mini",
        )
        const userApiKey = aiConfig.userApiKey || ""
        const verificationMode =
          (aiConfig && aiConfig.verificationMode) || "normal"
        const userRequestedVanillaNoFrameworkLocal =
          /(\bno framework\b|\btanpa framework\b|\bvanilla\b|\bplain html\b|\bhtml dan javascript\b|\bhtml\s*\+\s*javascript\b|\bsingle html\b)/i.test(
            String(originalRequest || ""),
          )
        const requestedUrlsLocal = Array.from(
          new Set(
            String(originalRequest || "").match(/https?:\/\/[^\s"'`<>]+/gi) ||
            [],
          ),
        )
        let planMarkdown = initialMarkdown
        // Ensure currentStepMarkdown is initialized
        let currentStepMarkdown = planMarkdown
        let modifiedFiles = new Set()
        let autoFixTriggered = false
        let hadStepError = false
        const stepHistoryBlocks = []
        const escapeRegExp = (s) =>
          String(s).replace(/[.*+?^${}()|[\]\\]/g, "\\$&")
        const normalizeSignatureText = (s) =>
          String(s || "")
            .toLowerCase()
            .replace(/\s+/g, " ")
            .replace(/\bstep\s+\d+[:.]?\s*/g, "")
            .trim()
        const isVerificationCommand = (cmd) =>
          /^(npm|pnpm|yarn|bun)\s+(run\s+)?(build|test|lint)\b/i.test(
            (cmd || "").trim(),
          ) ||
          /^(tsc|eslint|pytest|go test|cargo test)\b/i.test((cmd || "").trim())
        const isSimpleActionStep = (step) => {
          const stepType = String(step?.type || "").toLowerCase()
          const desc = String(step?.description || "").toLowerCase()
          const simpleTypes = new Set([
            "file_write",
            "file_modify",
            "write",
            "command",
            "apply_patch",
            "patch",
            "chat",
            "task",
          ])
          if (simpleTypes.has(stepType)) return true
          if (
            /\b(write|apply|patch|create|update|command)\b/.test(desc) &&
            !/\b(read|search|find|analy[sz]e)\b/.test(desc)
          ) {
            return true
          }
          return false
        }
        const shouldRunThinkPhase = (step) => {
